<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Embers</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Microsoft YaHei', 'PingFang SC', 'STKaiti', serif;
  overflow: hidden;
}
#game-wrapper {
  position: relative;
  overflow: hidden;
  background: #0a0a0a;
}
#game-canvas {
  position: relative;
  width: 1920px;
  height: 1080px;
  transform-origin: 0 0;
  overflow: hidden;
  background: #111;
}

/* Scene */
.scene-layer {
  position: absolute;
  inset: 0;
  background: url('./assets/scenes/bedroom/bedroom.png') center/cover no-repeat;
  transition: filter 0.5s;
}
.scene-layer.fear {
  background-image: url('./assets/scenes/bedroom/bedroom_fear.png');
}

/* Scene visibility */
.scene { display: none; }
.scene.active { display: block; }

/* Hotspots */
.hotspot {
  position: absolute;
  cursor: pointer;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s, transform 0.15s;
}
.hotspot:hover { transform: scale(1.2); }
.hotspot.hidden { opacity: 0; pointer-events: none; }
.hotspot img {
  max-width: 100%;
  max-height: 100%;
  pointer-events: none;
}
.hotspot.exit:hover { transform: scale(1.7); }

/* Living room text hotspots */
.lr-hotspot {
  position: absolute;
  cursor: pointer;
  z-index: 10;
  font-family: 'STKaiti', 'KaiTi', serif;
  font-size: 22px;
  color: rgba(220,200,180,0.7);
  text-shadow: 0 0 12px rgba(0,0,0,0.8), 0 2px 4px rgba(0,0,0,0.6);
  transition: opacity 0.5s, color 0.3s;
  white-space: nowrap;
  pointer-events: auto;
}
.lr-hotspot:hover { color: rgba(255,230,200,1); }
.lr-hotspot.hidden { opacity: 0; pointer-events: none; }
.lr-hotspot.exit-text {
  font-size: 18px;
  color: rgba(200,180,160,0.4);
}
.lr-hotspot.exit-text:hover { color: rgba(255,255,255,0.7); }

/* Navigation arrows (left/right) */
.nav-arrow {
  position: absolute;
  cursor: pointer;
  z-index: 10;
  transition: opacity 0.3s, transform 0.15s;
}
.nav-arrow:hover { transform: scale(1.2); }
.nav-arrow.hidden { opacity: 0; pointer-events: none; }
.nav-arrow img { pointer-events: none; }

/* Top-left UI */
.ui-top {
  position: absolute;
  left: 32px; top: 32px;
  display: flex;
  align-items: center;
  gap: 32px;
  z-index: 20;
}
.ui-top .uibtn {
  width: 100px;
  height: 100px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.ui-top .uibtn:hover { opacity: 0.8; }
.ui-top .uibtn img { width: 100%; height: 100%; }
.ui-top .time-box {
  width: 200px;
  height: 100px;
  position: relative;
}
.ui-top .time-box img { width: 100%; height: 100%; }
.ui-top .time-box span {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #ffe;
  font-size: 34px;
  font-family: 'Courier New', monospace;
  letter-spacing: 2px;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
}

/* Right toolbar */
.ui-toolbar {
  position: absolute;
  right: 32px;
  top: 342px;
  width: 164px;
  height: 588px;
  z-index: 20;
  pointer-events: none;
}
.ui-toolbar .tb-bg { width: 100%; height: 100%; }
.ui-toolbar .tb-items {
  position: absolute;
  left: 12px; right: 12px; top: 12px; bottom: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.ui-toolbar .tb-items .slot {
  flex: 1;
  background: rgba(0,0,0,0.35);
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
}
.ui-toolbar .tb-items .slot img {
  max-width: 65%;
  max-height: 65%;
  opacity: 0.8;
}

/* Bottom dialog */
.ui-dialog {
  position: absolute;
  left: 226px;
  bottom: 40px;
  width: 1468px;
  min-height: 130px;
  z-index: 55;
  display: none;
}
.ui-dialog.show { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.ui-dialog .dlg-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}
.ui-dialog .dlg-continue {
  position: absolute;
  right: 25px;
  bottom: 25px;
  width: 61px;
  height: 42px;
  transform: scale(0.5);
  transform-origin: right bottom;
  pointer-events: none;
}
.ui-dialog .dlg-text {
  position: relative;
  padding: 28px 60px;
  color: #2a1a0a;
  font-size: 34px;
  font-family: 'STKaiti', 'KaiTi', '楷体', serif;
  line-height: 1.7;
  min-height: 130px;
  text-shadow: 0 1px 2px rgba(255,255,255,0.25);
}

/* Modal overlay */
.modal-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.78);
  z-index: 50;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.modal-overlay.show { display: flex; animation: fadeIn 0.25s ease; }
.modal-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 800px;
  cursor: default;
}
.modal-box .item-img {
  max-width: 600px;
  max-height: 480px;
  border-radius: 10px;
  box-shadow: 0 10px 50px rgba(0,0,0,0.7);
  object-fit: contain;
  background: rgba(0,0,0,0.3);
}
.modal-box .item-img.transition {
  transition: opacity 0.4s;
}

.guess-area {
  margin-top: 28px;
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
}
.guess-area .opt {
  padding: 12px 44px;
  font-size: 26px;
  font-family: inherit;
  background: rgba(0,0,0,0.55);
  color: #f0e8e0;
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  min-width: 130px;
  text-align: center;
}
.guess-area .opt:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.5);
  transform: scale(1.06);
}
.guess-area .opt.correct {
  background: rgba(46, 125, 50, 0.7);
  border-color: #66bb6a;
}
.guess-area .opt.wrong {
  background: rgba(183, 28, 28, 0.7);
  border-color: #ef5350;
}

.modal-hint {
  margin-top: 18px;
  font-size: 28px;
  font-family: 'STKaiti', 'KaiTi', serif;
  color: #ffd699;
  min-height: 40px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.9);
}
.modal-closehint {
  margin-top: 12px;
  font-size: 18px;
  color: rgba(255,255,255,0.35);
}

/* Chaos phase 2: character spans */
.chaos-char {
  display: inline-block;
  transition: all 0.2s ease;
  position: relative;
}
.chaos-char.repel {
  transform: translateX(50px);
  opacity: 0.3;
}
.opt.flicker {
  animation: flickerText 0.3s infinite alternate;
}
@keyframes flickerText {
  0% { opacity: 1; }
  100% { opacity: 0.3; filter: blur(1px); }
}

/* Screen tear effect */
.screen-tear {
  animation: tearEffect 0.15s ease 3;
}
@keyframes tearEffect {
  0% { clip-path: inset(0 0 0 0); transform: translateX(0); }
  25% { clip-path: inset(10% 0 20% 0); transform: translateX(4px); }
  50% { clip-path: inset(40% 0 5% 0); transform: translateX(-3px); }
  75% { clip-path: inset(25% 0 35% 0); transform: translateX(5px); }
  100% { clip-path: inset(0 0 0 0); transform: translateX(0); }
}

/* Chaos phase 3: Brownian option (plain text, no box) */
.opt.brownian {
  position: fixed !important;
  z-index: 70;
  cursor: pointer;
  font-size: 20px;
  font-family: 'STKaiti', 'KaiTi', serif;
  background: none;
  border: none;
  padding: 0;
  margin: 0;
  color: rgba(200,180,160,0.7);
  text-shadow: 0 0 8px rgba(0,0,0,0.5);
  white-space: nowrap;
}
.opt.brownian:hover {
  color: rgba(255,220,180,0.95);
  text-shadow: 0 0 16px rgba(255,200,100,0.3);
}
.opt.brownian.crayon-target {
  color: rgba(220,200,180,0.85);
}

/* Phase 3 monologue spam */
.chaos-spam {
  position: absolute;
  inset: 0;
  z-index: 55;
  pointer-events: none;
  overflow: hidden;
  background: rgba(0,0,0,0.8);
}
.chaos-spam .spam-text {
  position: absolute;
  font-family: 'STKaiti', 'KaiTi', serif;
  font-size: 22px;
  color: rgba(200,180,160,0.6);
  white-space: nowrap;
  opacity: 0;
  animation: spamIn 0.6s ease forwards;
}
@keyframes spamIn {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

/* Memory overlay */
.memory-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 60;
  display: none;
  align-items: center;
  justify-content: center;
}
.memory-overlay.show { display: flex; }
.memory-overlay img {
  max-width: 80%;
  max-height: 80%;
  border-radius: 10px;
  box-shadow: 0 10px 80px rgba(0,0,0,0.9);
  animation: memIn 0.6s ease;
}
@keyframes memIn {
  0% { opacity: 0; transform: scale(0.92); }
  100% { opacity: 1; transform: scale(1); }
}

/* Settings */
.settings-menu {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.82);
  z-index: 70;
  display: none;
  align-items: center;
  justify-content: center;
}
.settings-menu.show { display: flex; }
.settings-panel {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  padding: 44px 64px;
  border-radius: 16px;
  text-align: center;
  min-width: 360px;
  border: 1px solid rgba(255,255,255,0.08);
}
.settings-panel h2 {
  color: #e0d8d0;
  font-size: 30px;
  margin-bottom: 28px;
  letter-spacing: 6px;
}
.settings-panel button {
  display: block;
  width: 100%;
  padding: 14px 0;
  margin: 10px 0;
  font-size: 22px;
  font-family: inherit;
  background: rgba(255,255,255,0.06);
  color: #ddd;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
}
.settings-panel button:hover { background: rgba(255,255,255,0.14); }
.settings-panel .s-close {
  margin-top: 18px;
  background: rgba(180, 40, 40, 0.25);
  border-color: rgba(180, 40, 40, 0.3);
}
.settings-panel .s-close:hover { background: rgba(180, 40, 40, 0.4); }

/* Scene transition */
.scene-fade {
  position: absolute;
  inset: 0;
  background: #000;
  z-index: 80;
  display: none;
  align-items: center;
  justify-content: center;
}
.scene-fade.show { display: flex; }
.scene-fade span {
  color: #ccc;
  font-size: 30px;
  letter-spacing: 4px;
  animation: pulse 1.4s ease infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* ===== Title Screen ===== */
.title-screen {
  position: absolute;
  inset: 0;
  z-index: 90;
  transition: opacity 0.8s ease;
  background: url('./assets/scenes/begin/游戏开始界面.png') center/100% 100% no-repeat;
  pointer-events: auto;
}
.title-screen.hidden {
  opacity: 0;
  pointer-events: none;
}
.title-screen .btn-img {
  position: absolute;
  cursor: pointer;
  z-index: 1;
  transition: opacity 0.2s, transform 0.15s;
  display: block;
  width: 354px;
  height: 94px;
}
.title-screen .btn-img:hover { opacity: 0.85; transform: scale(1.04); }
.title-screen .btn-img:active { transform: scale(0.96); }
#btnInstruction { width: 548px; }

/* ===== Instruction Overlay ===== */
.instruction-overlay {
  position: absolute;
  inset: 0;
  z-index: 95;
  display: none;
  cursor: pointer;
  background: rgba(0,0,0,0.85);
}
.instruction-overlay.show { display: flex; align-items: center; justify-content: center; }
.instruction-overlay img {
  max-width: 85%;
  max-height: 85%;
  border-radius: 4px;
  box-shadow: 0 8px 60px rgba(0,0,0,0.8);
}

/* ===== Ending Overlay ===== */
.ending-overlay {
  position: absolute;
  inset: 0;
  z-index: 100;
  display: none;
  background: #000;
}
.ending-overlay.show { display: block; }
.ending-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  transition: opacity 1s ease;
}
.ending-flare {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0;
  background: radial-gradient(circle at center, rgba(255,255,240,0.6) 0%, rgba(255,255,255,0.2) 40%, transparent 70%);
  animation: flareExpand 3s ease forwards;
}
@keyframes flareExpand {
  0% { opacity: 0; transform: scale(0.2); }
  40% { opacity: 1; transform: scale(1.2); }
  100% { opacity: 1; transform: scale(3); }
}
.ending-text {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 100px 160px;
  opacity: 0;
  transition: opacity 1s ease;
  z-index: 2;
}
.ending-text.show { opacity: 1; }
.ending-text .line {
  color: #f0e8e0;
  font-family: 'STKaiti', 'KaiTi', serif;
  font-size: 34px;
  line-height: 2;
  text-shadow: 0 2px 20px rgba(0,0,0,0.6);
  opacity: 0;
  animation: lineIn 0.8s ease forwards;
}
.ending-text .line.bad-news {
  font-family: 'SimSun', 'STSong', '宋体', serif;
  font-size: 26px;
  color: #aaa;
  line-height: 1.8;
  text-align: left;
  max-width: 800px;
}
@keyframes lineIn {
  0% { opacity: 0; transform: translateY(16px); }
  100% { opacity: 1; transform: translateY(0); }
}
.ending-credits {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 2s ease;
  z-index: 3;
}
.ending-credits.show { opacity: 1; }
.ending-credits span {
  color: #ccc;
  font-size: 24px;
  letter-spacing: 10px;
  margin: 6px 0;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-12px); }
  50% { transform: translateX(12px); }
  75% { transform: translateX(-6px); }
}
</style>
</head>
<body>
<div id="game-wrapper">
<div id="game-canvas">

  <!-- ===== SCENE: Bedroom ===== -->
  <div class="scene active" id="sceneBedroom">
    <div class="scene-layer" id="sceneLayer">
      <img src="./assets/items/bedroom/clock_blurred.png" alt="" style="position:absolute;left:971px;top:207px;width:440px;pointer-events:none;">
    </div>

    <!-- Clock hotspot -->
    <div class="hotspot" id="hsClock" style="left:1148px;top:125px;width:76px;height:76px;" data-item="clock" data-scene="bedroom">
      <img src="./assets/ui/arrow_black.png" alt="Clock" style="transform:rotate(-46.85deg) scale(1.7)">
    </div>

    <!-- Crayon hotspot -->
    <div class="hotspot" id="hsCrayon" style="left:948.55px;top:571.55px;width:66px;height:66px;" data-item="crayon" data-scene="bedroom">
      <img src="./assets/ui/arrow_black.png" alt="Crayon" style="transform:rotate(-51deg) scale(1.7)">
    </div>

    <!-- Nightstand hotspot -->
    <div class="hotspot" id="hsNightstand" style="left:821px;top:739px;width:66px;height:66px;" data-item="nightstand" data-scene="bedroom">
      <img src="./assets/ui/arrow_black.png" alt="Nightstand" style="transform:rotate(29.35deg) scaleX(-1) scale(1.7)">
    </div>

    <!-- Exit door to living room -->
    <div class="hotspot exit" id="hsDoorR" style="left:1788px;top:948px;width:90px;height:90px;" data-item="door" data-scene="bedroom">
      <img src="./assets/ui/arrow_white_exit.png" alt="Exit">
    </div>

    <!-- Study door (bottom-left) -->
    <div class="nav-arrow" id="hsStudyDoor" style="left:32px;top:948px;width:80px;height:80px;" data-item="studyDoor">
      <img src="./assets/ui/arrow_white_exit.png" alt="Study" style="transform:scaleX(-1);width:100%;height:100%;">
    </div>
  </div>

  <!-- ===== SCENE: Living Room ===== -->
  <div class="scene" id="sceneLivingroom">
    <div class="scene-layer" style="background-image:url('./assets/scenes/livingroom/livingroom.png');"></div>

    <!-- LR item: Mahjong -->
    <div class="hotspot" id="hsMahjong" style="left:282px;top:505px;width:60px;height:60px;" data-item="mahjong" data-scene="livingroom">
      <img src="./assets/ui/arrow_black.png" alt="" style="transform:scale(1.7)">
    </div>

    <!-- LR item: Photo -->
    <div class="hotspot" id="hsPhoto" style="left:356px;top:198px;width:60px;height:60px;" data-item="photo" data-scene="livingroom">
      <img src="./assets/ui/arrow_black.png" alt="" style="transform:scale(1.7)">
    </div>

    <!-- LR item: Height -->
    <div class="hotspot" id="hsHeight" style="left:960px;top:399px;width:60px;height:60px;" data-item="height" data-scene="livingroom">
      <img src="./assets/ui/arrow_black.png" alt="" style="transform:scale(1.7)">
    </div>

    <!-- LR item: Portrait -->
    <div class="hotspot" id="hsPortrait" style="left:1374px;top:191px;width:60px;height:60px;" data-item="portrait" data-scene="livingroom">
      <img src="./assets/ui/arrow_black.png" alt="" style="transform:scale(1.7)">
    </div>

    <!-- LR item: Yarn -->
    <div class="hotspot" id="hsYarn" style="left:1510px;top:722px;width:60px;height:60px;" data-item="yarn" data-scene="livingroom">
      <img src="./assets/ui/arrow_black.png" alt="" style="transform:scale(1.7)">
    </div>

    <!-- LR doors: Back to bedroom -->
    <div class="nav-arrow" id="lrDoorBedroom" style="left:32px;top:948px;width:80px;height:80px;" data-item="backToBedroom">
      <img src="./assets/ui/arrow_white_exit.png" alt="Back" style="transform:scaleX(-1);width:100%;height:100%;">
    </div>

    <!-- LR door: To washroom -->
    <div class="nav-arrow" id="lrDoorWashroom" style="left:1788px;top:948px;width:80px;height:80px;" data-item="toWashroom">
      <img src="./assets/ui/arrow_white_exit.png" alt="Washroom" style="width:100%;height:100%;">
    </div>

    <!-- LR door: To study (locked) -->
    <div class="lr-hotspot exit-text" id="lrDoorStudy" style="right:120px;top:350px;" data-item="toStudy">Locked Study</div>

    <!-- LR door: Main exit (locked) -->

    </div>
  </div>

  <!-- ===== SCENE: Washroom ===== -->
  <div class="scene" id="sceneWashroom">
    <div class="scene-layer" id="wrSceneLayer" style="background-image:url('./assets/scenes/washroom/washroom.png');"></div>

    <!-- Washroom item: Mirror -->
    <div class="hotspot" id="hsMirror" style="left:1008px;top:142px;width:112px;height:142px;" data-item="mirror" data-scene="washroom">
      <img src="./assets/ui/arrow_black.png" alt="" style="transform:rotate(5deg)">
    </div>

    <!-- Washroom item: Tap -->
    <div class="hotspot" id="hsTap" style="left:1035px;top:366px;width:80px;height:64px;" data-item="tap" data-scene="washroom">

    <!-- Washroom item: Broom -->
    <div class="hotspot" id="hsBroom" style="left:576px;top:550px;width:72px;height:72px;" data-item="broom_item" data-scene="washroom">
      <img src="./assets/ui/arrow_black.png" alt="" style="transform:scaleX(-1) scale(1.7)">
    </div>

    <!-- Washroom item: Under sink -->
    <div class="hotspot" id="hsUnderSink" style="left:911px;top:873px;width:96px;height:72px;" data-item="under_sink" data-scene="washroom">
      <img src="./assets/ui/arrow_black.png" alt="" style="transform:rotate(120deg) scale(1.7)">
    </div>

    <!-- Washroom exit: back to living room -->
    <div class="nav-arrow" id="wrExit" style="left:30px;top:740px;width:80px;height:80px;" data-item="backToLivingroom">
      <img src="./assets/ui/arrow_white_exit.png" alt="Back" style="transform:scaleX(-1);width:100%;height:100%;">
    </div>
  </div>

  <!-- ===== SCENE: Study ===== -->
  <div class="scene" id="sceneStudy">
    <div class="scene-layer" style="background-image:url('./assets/scenes/study/study.png');"></div>

    <!-- Study item: Medical record -->
    <div class="hotspot" id="hsMedicalRecord" style="left:929px;top:451px;width:80px;height:80px;" data-item="medical_record" data-scene="study">
      <img src="./assets/ui/arrow_medical.png" alt="" style="transform:scale(1.4)">
    </div>

<script>
// ===== State =====
const S = {
  currentScene: 'bedroom',
  items: {
    // bedroom
    clock:      { st: 'fresh' },
    crayon:     { st: 'fresh' },
    nightstand: { st: 'fresh' },
    // living room
    photo:    { st: 'fresh' },  // fresh | wrong | done
    yarn:     { st: 'fresh' },  // fresh | wrong | done
    height:   { st: 'fresh' },
    portrait: { st: 'fresh' },
    mahjong:  { st: 'fresh' },
    toStudy:  { st: 'locked' },
    mainExit: { st: 'locked' },
    // washroom
    under_sink: { st: 'fresh' },
    tap:     { st: 'fresh' },
    mirror:  { st: 'fresh' },
    broom_item: { st: 'fresh' },
    toWashroom: { st: 'fresh' },
    // study
    medical_record: { st: 'fresh' },
    books: { st: 'fresh' },
  },
  inv: [],
  sound: true,
  minutes: 0,
  seconds: 0,
  dlgTimer: null,
  memTimer: null,
  persistentSpam: [],
  persistentSpamActive: false,
  dlgBrownian: null,
  globalChaosActive: false,
  chaosCleared: false,
  isTrueEndRoute: false,
  visited: { livingroom: false, washroom: false, study: false },
};

// ===== Shortcuts =====
const $ = id => document.getElementById(id);
const scene     = $('sceneLayer');
const dlgBox    = $('dialogBox');
const dlgText   = $('dialogText');
const modalOv   = $('modalOverlay');
const modalImg  = $('modalImg');
const guessArea = $('guessArea');
const modalHint = $('modalHint');
const closeHint = $('closeHint');
const memOv     = $('memoryOverlay');
const memImg    = $('memoryImg');
const settings  = $('settingsMenu');
const invSlots  = $('inventorySlots');
const timeDisp  = $('timeDisplay');

// ===== Helpers =====
function showDlg(text, ms) {
  clearTimeout(S.dlgTimer);
  clearInterval(S.dlgBrownian);

  // Phase 3: dialog text Brownian motion
  const phase = getPhase();
  if (phase === 3) {
    dlgText.innerHTML = '';
    const chars = text.split('').map(ch => {
      const span = document.createElement('span');
      span.textContent = ch;
      span.style.cssText = 'display:inline-block;position:relative;transition:none;margin-right:0.15em;';
      dlgText.appendChild(span);
      return span;
    });
    S.dlgBrownian = setInterval(() => {
      if (!dlgBox.classList.contains('show')) { clearInterval(S.dlgBrownian); return; }
      chars.forEach(s => {
        const dx = (Math.random() - 0.5) * 8;
        const dy = (Math.random() - 0.5) * 6;
        s.style.transform = `translate(${dx}px,${dy}px)`;
      });
    }, 120);
  } else {
    dlgText.textContent = text;
  }

  dlgBox.classList.add('show');
  if (ms) S.dlgTimer = setTimeout(() => dlgBox.classList.remove('show'), ms);
}
function hideDlg() { clearTimeout(S.dlgTimer); clearInterval(S.dlgBrownian); dlgBox.classList.remove('show'); }
function showDlgSequence(lines, onDone) {
  if (!lines || !lines.length) { if (onDone) onDone(); return; }
  let idx = 0;
  const total = lines.length;
  let seqHandler = null;
  let seqActive = true;
  let blockHandler = null;

  function startBlock() {
    blockHandler = function(e) {
      if (!seqActive || !dlgBox.classList.contains('show')) return;
      if (!dlgBox.contains(e.target)) e.stopPropagation();
    };
    document.addEventListener('click', blockHandler, true);
  }
  function stopBlock() {
    if (blockHandler) { document.removeEventListener('click', blockHandler, true); blockHandler = null; }
  }

  function finish() {
    if (!seqActive) return;
    seqActive = false;
    stopBlock();
    if (seqHandler) { document.removeEventListener('click', seqHandler); seqHandler = null; }
    if (!modalOv.classList.contains('show')) closeHint.textContent = '';
    hideDlg();
    dlgBox.style.zIndex = '55';
    if (onDone) onDone();
  }

  function showNext() {
    if (!seqActive) return;
    if (idx >= total) { finish(); return; }
    const isLast = idx === total - 1;
    showDlg(lines[idx++]);
    if (isLast) {
      closeHint.textContent = '';
      stopBlock();
    } else {
      startBlock();
    }

    seqHandler = function(e) {
      if (dlgBox.contains(e.target)) {
        document.removeEventListener('click', seqHandler); seqHandler = null;
        if (isLast) { finish(); }
        else showNext();
      } else if (isLast) {
        document.removeEventListener('click', seqHandler); seqHandler = null;
        finish();
      }
    };
    setTimeout(() => { if (seqActive) document.addEventListener('click', seqHandler); }, 50);
  }

  showNext();
}

function openModal(src) {
  modalImg.src = src;
  guessArea.innerHTML = '';
  modalHint.textContent = '';
  closeHint.textContent = '';
  modalOv.classList.add('show');
}
function closeModal() { modalOv.classList.remove('show'); }


function updHotspots() {
  // Bedroom
  $('hsClock').classList.toggle('hidden', S.items.clock.st !== 'fresh');
  $('hsCrayon').classList.toggle('hidden', S.items.crayon.st === 'done' || S.items.crayon.st === 'wrong');
  $('hsNightstand').classList.toggle('hidden', S.items.nightstand.st === 'unlocked');

  // Living room
  $('hsPhoto').classList.toggle('hidden', S.items.photo.st !== 'fresh');
  $('hsYarn').classList.toggle('hidden', S.items.yarn.st !== 'fresh');
  $('hsHeight').classList.toggle('hidden', S.items.height.st !== 'fresh');
  $('hsPortrait').classList.toggle('hidden', S.items.portrait.st !== 'fresh');
  $('hsMahjong').classList.toggle('hidden', S.items.mahjong.st !== 'fresh');

  // Washroom
  $('hsUnderSink').classList.toggle('hidden', S.items.under_sink.st !== 'fresh');
  $('hsTap').classList.toggle('hidden', S.items.tap.st !== 'fresh');
  $('hsMirror').classList.toggle('hidden', S.items.mirror.st !== 'fresh');
  $('hsBroom').classList.toggle('hidden', S.items.broom_item.st !== 'fresh');

  // Study
  $('hsMedicalRecord').classList.toggle('hidden', S.items.medical_record.st !== 'fresh');
  $('hsBooks').classList.toggle('hidden', S.items.books.st !== 'fresh');
}

function updInv() {
  // Clear old inventory icons from canvas
  document.querySelectorAll('.inv-icon').forEach(el => el.remove());
  invSlots.innerHTML = '';

  const iconPos = {
    broom:     { x: 1767, y: 553, w: 74, h: 74, src: './assets/props/icon_broom.png' },
    key:       { x: 1768, y: 685, w: 76, h: 76, src: './assets/props/icon_study_key.png' },
    study_key: { x: 1768, y: 685, w: 76, h: 76, src: './assets/props/icon_study_key.png' },
    ring:      { x: 1767, y: 821, w: 79, h: 79, src: './assets/props/icon_wedding_ring.png' },
  };
  const labels = { key: 'Drawer Key', broom: 'Broom', ring: 'Wedding Ring', study_key: 'Study Key' };

  S.inv.forEach(item => {
    if (iconPos[item]) {
      const p = iconPos[item];
      const el = document.createElement('img');
      el.className = 'inv-icon';
      el.src = p.src;
      el.alt = labels[item] || item;
      el.style.cssText = `position:absolute;left:${p.x}px;top:${p.y}px;width:${p.w}px;height:${p.h}px;z-index:21;pointer-events:none;`;
      $('game-canvas').appendChild(el);
    } else {
      const slot = document.createElement('div');
      slot.className = 'slot';
      slot.title = labels[item] || item;
      slot.textContent = '?';
      slot.style.fontSize = '36px';
      invSlots.appendChild(slot);
    }
  });
}

// ===== Global Chaos Accumulation =====
const GLOBAL_CHAOS_PHRASES = [
  'Xiaoxue', 'Chen Huijun', 'doctor', 'lost', "can't remember", 'mother', "don't go",
  'so dark', 'forget', 'head hurts', "can't see", 'so blurry', 'cold', 'who',
  'go home', 'door', 'key', 'photo', 'painting', 'yarn', 'crayon', 'clock',
  'what time', 'wrong', "can't recall", 'help me', 'silence', 'water', 'mirror',
  'face', 'name', 'age', 'time', 'past', 'old', 'sick'
];

function addGlobalChaos(count) {
  const persistent = $('persistentChaos');
  persistent.style.display = 'block';
  const phrases = GLOBAL_CHAOS_PHRASES;
  for (let i = 0; i < count; i++) {
    const t = document.createElement('span');
    t.textContent = phrases[Math.floor(Math.random() * phrases.length)];
    t.style.cssText = 'position:absolute;font-family:STKaiti,KaiTi,serif;font-size:' + (12+Math.random()*20) + 'px;color:rgba(0,0,0,0.8);left:' + (Math.random()*94) + '%;top:' + (Math.random()*94) + '%;pointer-events:none;';
    persistent.appendChild(t);
    S.persistentSpam.push(t);
  }
  if (!S.globalChaosActive) {
    S.globalChaosActive = true;
    (function chaosLoop() {
      if (!S.globalChaosActive) return;
      S.persistentSpam.forEach(t => {
        const curL = parseFloat(t.style.left) || 50;
        const curT = parseFloat(t.style.top) || 50;
        t.style.left = Math.max(-2, Math.min(96, curL + (Math.random() - 0.5) * 3)) + '%';
        t.style.top = Math.max(-2, Math.min(96, curT + (Math.random() - 0.5) * 3)) + '%';
        t.style.opacity = (0.6 + Math.random() * 0.4);
      });
      setTimeout(chaosLoop, 500);
    })();
  }
}

function clearGlobalChaos() {
  S.globalChaosActive = false;
  S.persistentSpamActive = false;
  S.persistentSpam = [];
  S.chaosCleared = true;
  clearInterval(S.dlgBrownian);
  S.dlgBrownian = null;
  const persistent = $('persistentChaos');
  if (persistent) {
    persistent.innerHTML = '';
    persistent.style.display = 'none';
  }
}

function countMemories() {
  const done = name => S.items[name] && (S.items[name].st === 'done' || S.items[name].st === 'unlocked');
  let count = 0;
  if (done('crayon')) count++;
  if (done('photo')) count++;
  if (done('yarn')) count++;
  if (done('medical_record')) count++;
  if (done('nightstand')) count++;
  return count;
}

// ===== Clock =====
function doClock() {
  if (S.items.clock.st !== 'fresh') return;
  openModal('./assets/items/bedroom/clock_blurred.png');
  showDlg("I can't make out the time...");
  modalOv.onclick = function(e) {
    if (e.target !== modalOv) return;
    closeModal(); hideDlg();
    S.items.clock.st = 'done';
    updHotspots();
    modalOv.onclick = null;
  };
}

// ===== Phase by elapsed time =====
function getElapsed() { return S.minutes * 60 + S.seconds; }
function getPhase() {
  const t = getElapsed();
  if (t <= 120) return 1;
  if (t <= 240) return 2;
  return 3;
}

// ===== Crayon =====
// ===== Shared chaos-phase guess system =====
function initGuessItem(cfg) {
  return function() {
    const item = cfg.itemObj;
    if (item.st === 'done' || item.st === 'wrong') return;
    const phase = getPhase();

    openModal(cfg.blurredSrc);
    modalHint.textContent = phase === 1 ? cfg.hintPrompt || 'What is this...?' : '';
    closeHint.textContent = '';
    guessArea.innerHTML = '';
    guessArea.style.position = '';

    const opts = cfg.opts;
    const correctVal = cfg.correctVal;

    function finish() {
      closeModal();
      hideDlg();
      updHotspots();
      modalOv.onclick = null;
    }

    function handleCorrect(btn) {
      if (btn) btn.classList.add('correct');
      document.querySelectorAll('.outline-overlay').forEach(el => el.remove());
      modalHint.textContent = '';
      modalImg.src = cfg.memorySrc;
      modalImg.style.opacity = '1';
      item.st = 'done';
      closeHint.textContent = '';
      showDlgSequence(cfg.memoryLines, finish);
    }

    function handleWrong(btn) {
      btn.classList.add('wrong');
      document.querySelectorAll('.outline-overlay').forEach(el => el.remove());
      modalHint.textContent = 'No, think again...';
      item.st = 'wrong';
      updHotspots();
      closeHint.textContent = '';
      setTimeout(() => {
        closeModal();
        guessArea.innerHTML = '';
        modalHint.textContent = '';
      }, 1500);
    }

    function showOptions() {
      // ===== Phase 1 =====
      if (phase === 1) {
          const btns = opts.map(o => {
            const el = document.createElement('div');
            el.className = 'opt';
            el.textContent = o.lbl;
            el.dataset.val = o.val;
            guessArea.appendChild(el);
            return el;
          });
          const lock = () => btns.forEach(b => b.style.pointerEvents = 'none');
          btns.forEach(btn => {
            btn.onclick = function(e) {
              e.stopPropagation();
              if (item.st === 'done' || item.st === 'wrong') return;
              lock();
              if (this.dataset.val === correctVal) handleCorrect(this);
              else handleWrong(this);
            };
          });
          modalOv.onclick = function(e) {
            if (e.target !== modalOv) return;
            if (item.st === 'wrong') { closeModal(); modalOv.onclick = null; }
          };
          return;
        }

        // ===== Phase 2 =====
        if (phase === 2) {
          const btns = opts.map(o => {
            const el = document.createElement('div');
            el.className = 'opt';
            el.dataset.val = o.val;
            const chars = o.lbl.split('').map(ch => {
              const span = document.createElement('span');
              span.className = 'chaos-char';
              span.textContent = ch;
              return span;
            });
            chars.forEach(s => el.appendChild(s));
            guessArea.appendChild(el);
            return el;
          });

          const correctBtn = btns.find(b => b.dataset.val === correctVal);
          const wrongBtns = btns.filter(b => b !== correctBtn);

          const flickerInterval = setInterval(() => {
            if (item.st === 'done' || item.st === 'wrong') { clearInterval(flickerInterval); return; }
            const toggle = Math.floor(Date.now() / 400) % 2 === 0;
            const txt = toggle ? (cfg.flickerLabel || '???') : cfg.correctLabel;
            const cls = toggle ? 'flicker' : '';
            correctBtn.className = 'opt' + (cls ? ' ' + cls : '');
            correctBtn.textContent = txt;
            const chars = txt.split('').map(ch => {
              const span = document.createElement('span');
              span.className = 'chaos-char';
              span.textContent = ch;
              return span;
            });
            correctBtn.innerHTML = '';
            chars.forEach(s => correctBtn.appendChild(s));

            wrongBtns.forEach(btn => {
              const orig = btn.textContent;
              const shifted = orig.split('').map(ch => {
                const r = Math.random();
                if (r < 0.3) return String.fromCharCode(ch.charCodeAt(0) + (Math.random() < 0.5 ? 1 : -1));
                return ch;
              }).join('');
              btn.textContent = shifted;
              btn.className = 'opt' + (Math.random() < 0.3 ? ' flicker' : '');
              const spans = shifted.split('').map(ch => {
                const span = document.createElement('span');
                span.className = 'chaos-char';
                span.textContent = ch;
                return span;
              });
              btn.innerHTML = '';
              spans.forEach(s => btn.appendChild(s));
            });
          }, 400);

          modalOv.addEventListener('mousemove', function repelHandler(e) {
            if (item.st === 'done' || item.st === 'wrong') { modalOv.removeEventListener('mousemove', repelHandler); return; }
            btns.forEach(btn => {
              const rect = btn.getBoundingClientRect();
              const cx = rect.left + rect.width / 2;
              const cy = rect.top + rect.height / 2;
              const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
              const chars = btn.querySelectorAll('.chaos-char');
              if (dist < 120) {
                chars.forEach((ch, i) => {
                  const dir = i % 2 === 0 ? 1 : -1;
                  ch.classList.add('repel');
                  ch.style.transform = `translateX(${dir * 50}px)`;
                });
              } else {
                chars.forEach(ch => { ch.classList.remove('repel'); ch.style.transform = ''; });
              }
            });
          });

          const lock = () => { btns.forEach(b => b.style.pointerEvents = 'none'); clearInterval(flickerInterval); };
          btns.forEach(btn => {
            btn.onclick = function(e) {
              e.stopPropagation();
              if (item.st === 'done' || item.st === 'wrong') return;
              lock();
              if (this.dataset.val === correctVal) {
                modalImg.classList.add('screen-tear');
                setTimeout(() => modalImg.classList.remove('screen-tear'), 600);
                handleCorrect(this);
              } else {
                handleWrong(this);
              }
            };
          });
          modalOv.onclick = function(e) {
            if (e.target !== modalOv) return;
            if (item.st === 'wrong') { clearInterval(flickerInterval); closeModal(); modalOv.onclick = null; }
          };
          return;
        }

        // ===== Phase 3 =====
        if (phase === 3) {
          closeHint.textContent = '';
          modalHint.textContent = '......';
          modalImg.style.opacity = '0.3';
          guessArea.style.position = 'absolute';
          guessArea.style.left = '0';
          guessArea.style.top = '0';
          guessArea.style.width = '100%';
          guessArea.style.height = '100%';
          guessArea.style.pointerEvents = 'none';

          const btns = [];
          const rect = modalOv.getBoundingClientRect();
          opts.forEach(o => {
            const el = document.createElement('div');
            el.className = 'opt brownian' + (o.val === correctVal ? ' crayon-target' : '');
            el.textContent = o.lbl;
            el.dataset.val = o.val;
            el.style.pointerEvents = 'auto';
            el.style.left = (rect.left + 50 + Math.random() * (rect.width - 150)) + 'px';
            el.style.top = (rect.top + 50 + Math.random() * (rect.height - 100)) + 'px';
            document.body.appendChild(el);
            btns.push(el);
          });

          let brownianStop = false;
          function getGameRect() { return $('game-canvas').getBoundingClientRect(); }
          function brownianMoveBtns() {
            if (brownianStop) return;
            const area = getGameRect();
            btns.forEach(btn => {
              if (item.st !== 'fresh') { brownianStop = true; return; }
              const bx = parseFloat(btn.style.left);
              const by = parseFloat(btn.style.top);
              const speed = btn.dataset.val === correctVal ? 0.3 : 1;
              let nx = bx + (Math.random() - 0.5) * 250 * speed;
              let ny = by + (Math.random() - 0.5) * 200 * speed;
              nx = Math.max(area.left + 10, Math.min(area.right - 170, nx));
              ny = Math.max(area.top + 10, Math.min(area.bottom - 80, ny));
              btn.style.left = nx + 'px';
              btn.style.top = ny + 'px';
            });
            if (!brownianStop) setTimeout(brownianMoveBtns, 180);
          }
          brownianMoveBtns();

          let spamActive = true;
          const chaosPhrases = (cfg.chaosPhrases || []).filter(p => p !== cfg.correctLabel);
          const outlineImg = document.createElement('img');
          outlineImg.src = cfg.clearSrc;
          outlineImg.className = 'outline-overlay';
          outlineImg.style.cssText = 'position:absolute;inset:0;margin:auto;max-width:85%;max-height:85%;object-fit:contain;opacity:0.7;filter:brightness(0) invert(1) drop-shadow(0 0 3px rgba(255,255,255,0.25));z-index:1;pointer-events:none;';
          modalOv.appendChild(outlineImg);

          const spamTexts = [];
          const spamContainer = document.createElement('div');
          spamContainer.className = 'chaos-spam';
          spamContainer.id = 'chaosSpam';
          spamContainer.style.cssText = 'position:absolute;inset:0;z-index:55;pointer-events:none;overflow:hidden;';
          for (let i = 0; i < 80; i++) {
            const t = document.createElement('span');
            t.className = 'spam-text';
            t.textContent = chaosPhrases[Math.floor(Math.random() * chaosPhrases.length)];
            t.style.fontSize = (14 + Math.random() * 26) + 'px';
            t.style.color = `rgba(255,255,255,${0.1+Math.random()*0.25})`;
            t.style.left = (Math.random() * 95) + '%';
            t.style.top = (Math.random() * 95) + '%';
            t.style.animationDelay = (Math.random() * 2) + 's';
            spamContainer.appendChild(t);
            spamTexts.push(t);
          }
          modalOv.appendChild(spamContainer);

          function brownianSpam() {
            if (!spamActive) return;
            spamTexts.forEach(t => {
              const curL = parseFloat(t.style.left) || Math.random() * 90;
              const curT = parseFloat(t.style.top) || Math.random() * 90;
              t.style.left = Math.max(0, Math.min(92, curL + (Math.random() - 0.5) * 6)) + '%';
              t.style.top = Math.max(0, Math.min(92, curT + (Math.random() - 0.5) * 6)) + '%';
              t.style.opacity = (0.1 + Math.random() * 0.25);
            });
            setTimeout(brownianSpam, 400);
          }
          brownianSpam();

          function persistSpamToScene() {
            const spam = document.getElementById('chaosSpam');
            if (!spam) return;
            const persistent = $('persistentChaos');
            persistent.style.display = 'block';
            const texts = spam.querySelectorAll('.spam-text');
            texts.forEach(t => {
              const clone = t.cloneNode(true);
              clone.style.left = (Math.random() * 90) + '%';
              clone.style.top = (Math.random() * 90) + '%';
              clone.style.color = 'rgba(0,0,0,0.7)';
              persistent.appendChild(clone);
              S.persistentSpam.push(clone);
            });
            spam.remove();
            if (!S.globalChaosActive) {
              S.persistentSpamActive = true;
              (function persistentLoop() {
                if (!S.persistentSpamActive) return;
                S.persistentSpam.forEach(t => {
                  const curL = parseFloat(t.style.left) || 50;
                  const curT = parseFloat(t.style.top) || 50;
                  t.style.left = Math.max(0, Math.min(92, curL + (Math.random() - 0.5) * 4)) + '%';
                  t.style.top = Math.max(0, Math.min(92, curT + (Math.random() - 0.5) * 4)) + '%';
                  t.style.color = 'rgba(0,0,0,1)';
                  t.style.opacity = (0.6 + Math.random() * 0.4);
                });
                setTimeout(persistentLoop, 600);
              })();
            }
          }

          function collapseChaos(isCorrect) {
            if (spamActive === false && !isCorrect) return;
            spamActive = false;
            brownianStop = true;
            persistSpamToScene();
            btns.forEach(b => { if (b.parentNode) b.remove(); });
            if (isCorrect) {
              modalImg.style.opacity = '1';
              handleCorrect(null);
            } else {
              document.querySelectorAll('.outline-overlay').forEach(el => el.remove());
              modalImg.style.opacity = '1';
              modalHint.textContent = 'Memory... fading...';
              item.st = 'wrong';
              updHotspots();
              guessArea.style.pointerEvents = '';
              setTimeout(() => {
                closeModal();
                guessArea.innerHTML = '';
                modalHint.textContent = '';
                guessArea.style.position = '';
                guessArea.style.left = '';
                guessArea.style.top = '';
                guessArea.style.width = '';
                guessArea.style.height = '';
                guessArea.style.pointerEvents = '';
              }, 2000);
            }
          }

          btns.forEach(btn => {
            btn.onclick = function(e) {
              e.stopPropagation();
              if (item.st !== 'fresh') return;
              if (this.dataset.val === correctVal) {
                btn.style.color = 'rgba(100,255,100,1)';
                btn.style.textShadow = '0 0 20px rgba(100,255,100,0.6)';
                setTimeout(() => collapseChaos(true), 300);
              } else {
                btn.style.color = 'rgba(255,80,80,1)';
                setTimeout(() => collapseChaos(false), 200);
              }
            };
          });
          modalOv.onclick = null;

          const origClose = closeModal;
          closeModal = function() {
            document.querySelectorAll('.outline-overlay').forEach(el => el.remove());
            brownianStop = true;
            spamActive = false;
            persistSpamToScene();
            btns.forEach(b => { if (b.parentNode) b.remove(); });
            modalImg.style.opacity = '1';
            guessArea.style.position = '';
            guessArea.style.left = '';
            guessArea.style.top = '';
            guessArea.style.width = '';
            guessArea.style.height = '';
            guessArea.style.pointerEvents = '';
            origClose();
            closeModal = origClose;
          };
        }
    };

    // Play monologue first, then show options
    showDlgSequence(cfg.monologueLines, showOptions);
  };
}

function doNightstand() {
  const item = S.items.nightstand;
  if (item.st === 'unlocked') return;

  openModal('./assets/items/bedroom/nightstand_locked.png');

  if (!S.inv.includes('key')) {
    modalHint.textContent = 'Need a key';
    showDlg("No matter how hard I pull, there is only the rusty screech of jammed iron in the keyhole. (need a key)");
    modalOv.onclick = function(e) {
      if (e.target !== modalOv) return;
      closeModal(); hideDlg();
      modalOv.onclick = null;
    };
    return;
  }

  // Has key → show the drawer opened with ring guess
  modalHint.textContent = 'A wedding ring and a key in the drawer...';
  closeModal();
  modalOv.onclick = null;

  setTimeout(() => {
    const ringItem = { st: 'fresh' };
    openModal('./assets/items/bedroom/ring_blurred.png');
    modalHint.textContent = getPhase() === 1 ? 'What is this...?' : '';
    closeHint.textContent = '';
    guessArea.innerHTML = '';

    const ringMonologue = ['A wedding ring... whose is this?'];
    const ringMemoryLines = ["Husband: It's our wedding day. Why are you crying?", "Husband: Huijun, stay with me, and I'll never let you suffer."];
    const ringOpts = [
      { lbl: 'Wedding Ring', val: 'ring' },
      { lbl: 'Bracelet', val: 'bracelet' },
      { lbl: 'Necklace', val: 'necklace' }
    ];
    const correctVal = 'ring';

    function handleCorrect(btn) {
      if (btn) btn.classList.add('correct');
      document.querySelectorAll('.outline-overlay').forEach(el => el.remove());
      modalHint.textContent = 'A wedding ring...';
      item.st = 'unlocked';
      if (!S.inv.includes('ring')) { S.inv.push('ring'); updInv(); }
      if (!S.inv.includes('study_key')) { S.inv.push('study_key'); updInv(); }
      closeHint.textContent = '';

      // Show wedding memory image + memory text
      modalImg.src = './assets/memories/memory5_wedding.png';
      modalImg.style.opacity = '1';
      showDlgSequence(ringMemoryLines, function() {
        closeModal();
        hideDlg();
        updHotspots();
        modalOv.onclick = null;
      });
    }

    function handleWrong(btn) {
      btn.classList.add('wrong');
      document.querySelectorAll('.outline-overlay').forEach(el => el.remove());
      modalHint.textContent = 'No, think again...';
      closeHint.textContent = '';
      setTimeout(() => {
        closeModal();
        guessArea.innerHTML = '';
        modalHint.textContent = '';
      }, 1500);
    }

    const phase = getPhase();

    function showRingOptions() {
      // Phase 1
      if (phase === 1) {
        const btns = ringOpts.map(o => {
          const el = document.createElement('div');
          el.className = 'opt';
          el.textContent = o.lbl;
          el.dataset.val = o.val;
          guessArea.appendChild(el);
          return el;
        });
        const lock = () => btns.forEach(b => b.style.pointerEvents = 'none');
        btns.forEach(btn => {
          btn.onclick = function(e) {
            e.stopPropagation();
            lock();
            if (this.dataset.val === correctVal) handleCorrect(this);
            else handleWrong(this);
          };
        });
        modalOv.onclick = function(e) {
          if (e.target !== modalOv) return;
          if (ringItem.st === 'wrong') { closeModal(); modalOv.onclick = null; }
        };
        return;
      }

      // Phase 2
      if (phase === 2) {
        const btns = ringOpts.map(o => {
          const el = document.createElement('div');
          el.className = 'opt';
          el.dataset.val = o.val;
          const chars = o.lbl.split('').map(ch => {
            const span = document.createElement('span');
            span.className = 'chaos-char';
            span.textContent = ch;
            return span;
          });
          chars.forEach(s => el.appendChild(s));
          guessArea.appendChild(el);
          return el;
        });

        const allSpans = btns.flatMap(b => [...b.querySelectorAll('.chaos-char')]);
        const chaosInterval = setInterval(() => {
          if (!modalOv.classList.contains('show')) { clearInterval(chaosInterval); return; }
          allSpans.forEach(s => {
            if (Math.random() < 0.3) {
              const r = Math.random();
              if (r < 0.7) {
                s.style.transform = `translate(${(Math.random() - 0.5) * 20}px,${(Math.random() - 0.5) * 20}px)`;
              } else {
                s.textContent = String.fromCharCode(s.textContent.charCodeAt(0) + (Math.random() < 0.5 ? 1 : -1));
              }
            }
          });
          btns.forEach(b => {
            b.onmousemove = function(ev) {
              const rect = this.getBoundingClientRect();
              const mx = ev.clientX, my = ev.clientY;
              const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
              const dist = Math.sqrt((mx - cx) ** 2 + (my - cy) ** 2);
              if (dist < 120) {
                const angle = Math.atan2(my - cy, mx - cx);
                const push = 50 * (1 - dist / 120);
                this.style.transform = `translate(${-Math.cos(angle) * push}px,${-Math.sin(angle) * push}px)`;
              } else {
                this.style.transform = '';
              }
            };
          });
        }, 400);

        const lock = () => { clearInterval(chaosInterval); btns.forEach(b => b.style.pointerEvents = 'none'); };
        btns.forEach(btn => {
          btn.onclick = function(e) {
            e.stopPropagation();
            lock();
            if (this.dataset.val === correctVal) handleCorrect(this);
            else handleWrong(this);
          };
        });
        modalOv.onclick = function(e) {
          if (e.target !== modalOv) return;
          if (ringItem.st === 'wrong') { closeModal(); clearInterval(chaosInterval); modalOv.onclick = null; }
        };
        return;
      }

      // Phase 3
      if (phase === 3) {
        closeHint.textContent = '';
        modalHint.textContent = '......';
        modalImg.style.opacity = '0.3';
        guessArea.style.position = 'absolute';
        guessArea.style.left = '0';
        guessArea.style.top = '0';
        guessArea.style.width = '100%';
        guessArea.style.height = '100%';
        guessArea.style.pointerEvents = 'none';

        const outlineImg = document.createElement('img');
        outlineImg.src = './assets/items/bedroom/ring.png';
        outlineImg.className = 'outline-overlay';
        outlineImg.style.cssText = 'position:absolute;inset:0;margin:auto;max-width:85%;max-height:85%;object-fit:contain;opacity:0.7;filter:brightness(0) invert(1) drop-shadow(0 0 3px rgba(255,255,255,0.25));z-index:1;pointer-events:none;';
        modalOv.appendChild(outlineImg);

        const opts = ringOpts.map(o => {
          const el = document.createElement('div');
          el.className = 'opt brownian';
          el.dataset.val = o.val;
          el.textContent = o.lbl;
          el.style.pointerEvents = 'auto';
          const rect = modalOv.getBoundingClientRect();
          el.style.left = (rect.left + 50 + Math.random() * (rect.width - 150)) + 'px';
          el.style.top = (rect.top + 50 + Math.random() * (rect.height - 100)) + 'px';
          document.body.appendChild(el);
          return el;
        });

        let brownianStop = false;
        function getGameRect() { return $('game-canvas').getBoundingClientRect(); }
        function brownianMoveBtns() {
          if (brownianStop) return;
          const area = getGameRect();
          opts.forEach(btn => {
            if (ringItem.st !== 'fresh') { brownianStop = true; return; }
            const bx = parseFloat(btn.style.left);
            const by = parseFloat(btn.style.top);
            let nx = bx + (Math.random() - 0.5) * 250;
            let ny = by + (Math.random() - 0.5) * 200;
            nx = Math.max(area.left + 10, Math.min(area.right - 170, nx));
            ny = Math.max(area.top + 10, Math.min(area.bottom - 80, ny));
            btn.style.left = nx + 'px';
            btn.style.top = ny + 'px';
          });
          if (!brownianStop) setTimeout(brownianMoveBtns, 180);
        }
        brownianMoveBtns();

        let spamActive = true;
        const chaosPhrases = ['I remember...', 'the ring...', 'our wedding...', 'so long ago...'];
        const spamTexts = [];
        const spamContainer = document.createElement('div');
        spamContainer.className = 'chaos-spam';
        spamContainer.id = 'chaosSpam';
        spamContainer.style.cssText = 'position:absolute;inset:0;z-index:55;pointer-events:none;overflow:hidden;';
        for (let i = 0; i < 40; i++) {
          const t = document.createElement('span');
          t.className = 'spam-text';
          t.textContent = chaosPhrases[Math.floor(Math.random() * chaosPhrases.length)];
          t.style.fontSize = (14 + Math.random() * 26) + 'px';
          t.style.color = `rgba(255,255,255,${0.1+Math.random()*0.25})`;
          t.style.left = (Math.random() * 95) + '%';
          t.style.top = (Math.random() * 95) + '%';
          t.style.animationDelay = (Math.random() * 2) + 's';
          spamContainer.appendChild(t);
          spamTexts.push(t);
        }
        modalOv.appendChild(spamContainer);

        function brownianSpam() {
          if (!spamActive) return;
          spamTexts.forEach(t => {
            const curL = parseFloat(t.style.left) || Math.random() * 90;
            const curT = parseFloat(t.style.top) || Math.random() * 90;
            t.style.left = Math.max(0, Math.min(92, curL + (Math.random() - 0.5) * 6)) + '%';
            t.style.top = Math.max(0, Math.min(92, curT + (Math.random() - 0.5) * 6)) + '%';
            t.style.opacity = (0.1 + Math.random() * 0.25);
          });
          setTimeout(brownianSpam, 400);
        }
        brownianSpam();

        function collapseChaos(isCorrect) {
          if (spamActive === false && !isCorrect) return;
          spamActive = false;
          brownianStop = true;
          opts.forEach(b => { if (b.parentNode) b.remove(); });
          if (isCorrect) {
            document.querySelectorAll('.outline-overlay').forEach(el => el.remove());
            modalImg.style.opacity = '1';
            handleCorrect(null);
          } else {
            document.querySelectorAll('.outline-overlay').forEach(el => el.remove());
            modalImg.style.opacity = '1';
            modalHint.textContent = 'Memory... fading...';
            ringItem.st = 'wrong';
            guessArea.style.pointerEvents = '';
            setTimeout(() => {
              closeModal();
              guessArea.innerHTML = '';
              modalHint.textContent = '';
              guessArea.style.position = '';
              guessArea.style.left = '';
              guessArea.style.top = '';
              guessArea.style.width = '';
              guessArea.style.height = '';
              guessArea.style.pointerEvents = '';
            }, 2000);
          }
        }

        const lock = () => { opts.forEach(b => b.style.pointerEvents = 'none'); };
        opts.forEach(btn => {
          btn.onclick = function(e) {
            e.stopPropagation();
            if (ringItem.st !== 'fresh') return;
            lock();
            if (this.dataset.val === correctVal) {
              btn.style.color = 'rgba(100,255,100,1)';
              btn.style.textShadow = '0 0 20px rgba(100,255,100,0.6)';
              setTimeout(() => collapseChaos(true), 300);
            } else {
              btn.style.color = 'rgba(255,80,80,1)';
              setTimeout(() => collapseChaos(false), 200);
            }
          };
        });
        modalOv.onclick = null;

        const origClose = closeModal;
        closeModal = function() {
          document.querySelectorAll('.outline-overlay').forEach(el => el.remove());
          brownianStop = true;
          spamActive = false;
          opts.forEach(b => { if (b.parentNode) b.remove(); });
          if (spamContainer.parentNode) spamContainer.remove();
          modalImg.style.opacity = '1';
          guessArea.style.position = '';
          guessArea.style.left = '';
          guessArea.style.top = '';
          guessArea.style.width = '';
          guessArea.style.height = '';
          guessArea.style.pointerEvents = '';
          origClose();
          closeModal = origClose;
        };
      }
    }

    // Show monologue first, then options
    showDlgSequence(ringMonologue, showRingOptions);
  }, 300);
}

// ===== Scene Management =====
function showScene(name) {
  S.currentScene = name;
  document.querySelectorAll('.scene').forEach(el => el.classList.remove('active'));
  const targets = { bedroom: 'sceneBedroom', livingroom: 'sceneLivingroom', washroom: 'sceneWashroom', study: 'sceneStudy' };
  const target = $(targets[name]);
  if (target) target.classList.add('active');
  updHotspots();
}

function dismissableDlg(text) {
  showDlg(text);
  const handler = function(e) {
    if (dlgBox.contains(e.target)) {
      hideDlg();
      document.removeEventListener('click', handler);
    }
  };
  setTimeout(() => document.addEventListener('click', handler), 50);
}

function switchToScene(name, msg) {
  $('sceneFade').classList.add('show');
  dismissableDlg(msg || 'Switching scenes...');
  setTimeout(() => {
    $('sceneFade').classList.remove('show');
    hideDlg();
    showScene(name);
    if (name === 'livingroom') {
      if (!S.visited.livingroom) {
        S.visited.livingroom = true;
        dismissableDlg('Did I live here for a very long time?');
      } else {
        dismissableDlg('This is... the living room.');
      }
    }
    if (name === 'washroom') {
      if (!S.visited.washroom) {
        S.visited.washroom = true;
        showDlgSequence(["The air here is damp and cold, carrying a chilly scent of porcelain tiles.", "The faucet isn't closed tight; it keeps dripping."]);
      } else {
        dismissableDlg('This is... the bathroom.');
      }
    }
    if (name === 'study') {
      if (!S.visited.study) {
        S.visited.study = true;
        dismissableDlg('Why was this room locked? It is filled with the scent of ink.');
      } else {
        dismissableDlg('This is... the study.');
      }
    }
  }, 500);
}

function triggerTrueEnd() {
  const eo = $('endingOverlay');
  const bg = $('endingBg');
  const flare = $('endingFlare');

  // Raise UI so they stay visible through ending
  dlgBox.style.zIndex = '110';
  const uiTop = document.querySelector('.ui-top');
  const uiToolbar = document.querySelector('.ui-toolbar');
  if (uiTop) uiTop.style.zIndex = '110';
  if (uiToolbar) uiToolbar.style.zIndex = '110';
  document.querySelectorAll('.inv-icon').forEach(el => el.style.zIndex = '110');

  eo.classList.add('show');
  bg.style.backgroundImage = "url('./assets/scenes/endings/door_open_true.png')";
  bg.style.opacity = '1';
  flare.style.display = 'none';

  // Step 1: after background loads, start radial flare from X:684, Y:488
  // Stop any dialog Brownian motion from chaos phases
  clearInterval(S.dlgBrownian);
  S.dlgBrownian = null;
  setTimeout(() => {
    // White circle expanding from 684,488 using clip-path
    flare.style.cssText = `
      position: absolute;
      left: 0; top: 0; width: 100%; height: 100%;
      background: #fff;
      pointer-events: none;
      z-index: 3;
      animation: none;
      clip-path: circle(0% at 684px 488px);
      transition: clip-path 4s ease;
    `;
    flare.style.display = 'block';
    // Expand the white circle over 4s
    requestAnimationFrame(() => {
      flare.style.clipPath = 'circle(150% at 684px 488px)';
    });

    // After expansion, show first dialog
    setTimeout(() => {
      bg.style.transition = 'opacity 0.5s ease';
      bg.style.opacity = '0';

      setTimeout(() => {
        dlgText.textContent = 'Xiaoxue: "Mom, how did you end up walking all the way here alone? Your hands are so cold..."';
        dlgBox.classList.add('show');

        setTimeout(() => {
          dlgBox.classList.remove('show');
          dlgText.textContent = 'Chen Huijun: "Xiaoxue...Mom remembered your name today."';
          dlgBox.classList.add('show');

          setTimeout(() => {
            dlgBox.classList.remove('show');
            flare.style.transition = 'opacity 0.8s ease';
            flare.style.opacity = '0';
            bg.style.transition = 'none';
            bg.style.backgroundImage = "url('./assets/scenes/endings/true_title.png')";
            bg.style.opacity = '1';
            setTimeout(() => { flare.style.display = 'none'; }, 1000);
          }, 5000);
        }, 3000);
      }, 1000);
    }, 4200);
  }, 500);
}

function triggerBadEnd() {
  const eo = $('endingOverlay');
  const bg = $('endingBg');
  const txt = $('endingText');
  const flare = $('endingFlare');
  flare.style.display = 'none';

  // Raise UI elements above ending overlay so they stay visible through flicker
  dlgBox.style.zIndex = '110';
  const uiTop = $('btnSettings').closest('.ui-top') || document.querySelector('.ui-top');
  const uiToolbar = document.querySelector('.ui-toolbar');
  if (uiTop) uiTop.style.zIndex = '110';
  if (uiToolbar) uiToolbar.style.zIndex = '110';
  document.querySelectorAll('.inv-icon').forEach(el => el.style.zIndex = '110');
  eo.classList.add('show');
  bg.style.backgroundImage = "url('./assets/scenes/endings/door_open_bad.png')";
  bg.style.opacity = '1';

  // Phase 1: screen shake + door open
  eo.style.animation = 'shake 0.15s ease 3';
  setTimeout(() => { eo.style.animation = ''; }, 600);

  // Phase 2: dual image flicker + news in dialog
  setTimeout(() => {
    let flickerOn = true;
    const flickerInterval = setInterval(() => {
      bg.style.backgroundImage = flickerOn
        ? "url('./assets/scenes/endings/bad_chroma_distorted.png')"
        : "url('./assets/scenes/endings/bad_mono_distorted.png')";
      bg.style.filter = flickerOn ? 'hue-rotate(' + (Math.random() * 60) + 'deg) contrast(1.8)' : 'grayscale(1) contrast(2.2)';
      flickerOn = !flickerOn;
    }, 100 + Math.random() * 150);

    // Show news text in dialog box (persistent through phases 2 & 3)
    showDlg('[Missing Person Notice] Chen Huijun, female, 78, with severe Alzheimer\'s disease. Went missing from home this afternoon, last seen wearing a grey knit cardigan... If you have any information, please contact her family. Her daughter is still waiting for her to come home.');

    // Phase 3: stop flicker → bad title screen, keep dialog text unchanged
    setTimeout(() => {
      clearInterval(flickerInterval);
      bg.style.filter = 'none';
      bg.style.backgroundImage = "url('./assets/scenes/endings/bad_title_screen.png')";
      bg.style.backgroundColor = '#000';
      bg.style.opacity = '1';
      bg.style.transition = 'opacity 0.8s ease';

      // Keep dialog text as-is (still showing from phase 2)

      // End: all UI + ending overlay fade out together → title screen
      setTimeout(() => {
        // Show title screen behind everything first
        const ts = $('titleScreen');
        ts.style.display = '';
        ts.classList.remove('hidden');
        ts.style.opacity = '1';
        ts.style.transition = 'none';

        // Fade out all UI elements + ending overlay simultaneously
        const uiEls = [
          document.querySelector('.ui-top'),
          document.querySelector('.ui-toolbar'),
          dlgBox,
          ...document.querySelectorAll('.inv-icon')
        ].filter(Boolean);
        uiEls.forEach(el => {
          el.style.transition = 'opacity 1.5s ease';
          el.style.opacity = '0';
        });
        eo.style.transition = 'opacity 1.5s ease';
        eo.style.opacity = '0';

        setTimeout(() => {
          hideDlg();
          dlgBox.style.zIndex = '55';
          dlgBox.style.opacity = '';
          dlgBox.style.transition = '';
          const uiTop = document.querySelector('.ui-top');
          const uiToolbar = document.querySelector('.ui-toolbar');
          if (uiTop) { uiTop.style.zIndex = '20'; uiTop.style.opacity = ''; uiTop.style.transition = ''; }
          if (uiToolbar) { uiToolbar.style.zIndex = '20'; uiToolbar.style.opacity = ''; uiToolbar.style.transition = ''; }
          document.querySelectorAll('.inv-icon').forEach(el => {
            el.style.zIndex = '21';
            el.style.opacity = '';
            el.style.transition = '';
          });
          eo.style.transition = '';
          eo.style.opacity = '';
          eo.classList.remove('show');
          eo.innerHTML = '<div class="ending-bg" id="endingBg"></div><div class="ending-flare" id="endingFlare"></div><div class="ending-text" id="endingText"></div>';
        }, 1500);
      }, 6000);
    }, 8000);
  }, 1000);
}

function doMirror() {
  const item = S.items.mirror;
  if (item.st !== 'fresh') return;
  const phase = getPhase();

  openModal('./assets/items/washroom/vanity_mirror.png');
  modalHint.textContent = "The mirror is completely blurred, I can't see clearly... Please enter your name:";
  closeHint.textContent = '';

  const inputArea = document.createElement('div');
  inputArea.style.cssText = 'margin-top:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center;';
  const inputEl = document.createElement('input');
  inputEl.type = 'text';
  inputEl.placeholder = 'Your name...';
  inputEl.style.cssText = 'padding:10px 20px;font-size:26px;font-family:STKaiti,KaiTi,serif;background:rgba(0,0,0,0.6);color:#f0e8e0;border:2px solid rgba(255,255,255,0.2);border-radius:8px;outline:none;width:280px;text-align:center;';
  const submitBtn = document.createElement('div');
  submitBtn.className = 'opt';
  submitBtn.textContent = 'Confirm';
  submitBtn.style.cssText = 'padding:10px 28px;font-size:22px;font-family:inherit;background:rgba(0,0,0,0.55);color:#f0e8e0;border:2px solid rgba(255,255,255,0.2);border-radius:10px;cursor:pointer;';
  inputArea.appendChild(inputEl);
  inputArea.appendChild(submitBtn);
  const ck = document.querySelector('.modal-box');
  ck.appendChild(inputArea);

  let mirrorResolved = false;
  let confirmClicked = false;

  function collapseMirror(skipChaos) {
    if (mirrorResolved) return;
    mirrorResolved = true;
    item.st = 'done';
    updHotspots();

    if (!skipChaos) {
      const phrases = ['Xiaoxue', 'Chen Huijun', 'doctor', 'lost', "can't remember", 'who is in the mirror', "can't see", 'so blurry', 'mother', "don't go"];
      const container = document.createElement('div');
      container.className = 'chaos-spam';
      container.id = 'mirrorSpam';
      container.style.cssText = 'position:absolute;inset:0;z-index:55;pointer-events:none;overflow:hidden;background:rgba(0,0,0,0.85);';
      for (let i = 0; i < 120; i++) {
        const t = document.createElement('span');
        t.className = 'spam-text';
        t.textContent = phrases[Math.floor(Math.random() * phrases.length)];
        t.style.cssText = 'position:absolute;font-family:STKaiti,KaiTi,serif;font-size:' + (12+Math.random()*28) + 'px;';
        t.style.color = 'rgba(0,0,0,' + (0.3+Math.random()*0.5) + ')';
        t.style.left = (Math.random() * 96) + '%';
        t.style.top = (Math.random() * 96) + '%';
        t.style.animationDelay = (Math.random() * 1.5) + 's';
        t.style.opacity = '0';
        t.style.animation = 'spamIn 0.5s ease forwards';
        container.appendChild(t);
      }
      modalOv.appendChild(container);
      modalHint.textContent = '......';
      if (inputArea.parentNode) inputArea.remove();

      setTimeout(() => {
        const spam = document.getElementById('mirrorSpam');
        if (spam) {
          const persistent = $('persistentChaos');
          persistent.style.display = 'block';
          spam.querySelectorAll('.spam-text').forEach(t => {
            const clone = t.cloneNode(true);
            clone.style.color = 'rgba(0,0,0,1)';
            clone.style.left = (Math.random() * 90) + '%';
            clone.style.top = (Math.random() * 90) + '%';
            persistent.appendChild(clone);
            S.persistentSpam.push(clone);
          });
          spam.remove();
        }
        closeModal();
        modalOv.onclick = null;
      }, 4000);
    } else {
      // Correct guess: clean close, no chaos
      if (inputArea.parentNode) inputArea.remove();
      closeHint.textContent = '';
      modalOv.onclick = function(e) {
        if (e.target !== modalOv) return;
        closeModal();
        modalOv.onclick = null;
      };
    }
  }

  function handleSubmit(e) {
    if (e) e.stopPropagation();
    if (mirrorResolved || confirmClicked) return;
    const val = inputEl.value.trim();
    if (!val) { modalHint.textContent = 'Please enter your name...'; return; }
    confirmClicked = true;
    const nameCorrect = val.toLowerCase() === 'chenhuijun';
    const allMemories = countMemories() === 5;
    S.isTrueEndRoute = nameCorrect && allMemories;

    if (nameCorrect) {
      clearGlobalChaos();
      modalHint.textContent = 'Yes, I am Chen Huijun.';
      showDlg('Yes... I am Chen Huijun.');
    } else {
      modalHint.textContent = "I still can't remember who I am...";
      showDlg("I still can't remember who I am... My body feels even more uncomfortable.", 2000);
    }

    // After brief pause, begin aphasia swallowing show (skip chaos if correct)
    setTimeout(() => {
      hideDlg();
      collapseMirror(nameCorrect);
    }, nameCorrect ? 2500 : 2000);
  }

  submitBtn.onclick = handleSubmit;
  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); handleSubmit(e); }
  });

  // Phase 3: chaos visual effects on mirror (no auto-collapse)
  if (phase === 3) {
    let chaosMirrorInterval = setInterval(() => {
      if (mirrorResolved || !modalOv.classList.contains('show')) {
        clearInterval(chaosMirrorInterval);
        return;
      }
      modalHint.textContent = ['Who...?', '......', 'I can\'t see...', 'Who is this...'][Math.floor(Math.random() * 4)];
      inputEl.style.transform = 'translate(' + (Math.random() - 0.5) * 6 + 'px,' + (Math.random() - 0.5) * 6 + 'px)';
    }, 600);
  }

  modalOv.onclick = function(e) {
    if (e.target !== modalOv) return;
    if (mirrorResolved) { closeModal(); modalOv.onclick = null; return; }
    if (inputArea.parentNode) inputArea.remove();
    closeModal();
    modalOv.onclick = null;
  };
}

    under_sink: doUnderSink, tap: doTap, mirror: doMirror, broom_item: doBroomItem, backToLivingroom: doBackToLivingroom,
    studyDoor: doStudyDoor,
    medical_record: doMedicalRecord, books: doBooks, backToBedroomFromStudy: doBackToBedroomFromStudy, backToLivingroomFromStudy: doBackToLivingroomFromStudy

  if (fn) fn();

  if (S.chaosCleared) {
    S.chaosCleared = false;
  } else {
    addGlobalChaos(2 + Math.floor(Math.random() * 6));
  }
}

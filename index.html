// ===== Text Overlap Meltdown System =====
const FRAGMENTS = ["who am I", "teacup", "don't remember", "go home", "take medicine", "don't go", "white hair", "mirror", "lost", "forgotten", "daughter", "cold", "empty", "help me", "so tired", "sleep"];

function generateTextObstruction(level) {
  const stage = $('game-canvas');
  const count = Math.floor(level * 0.25);
  for (let i = 0; i < count; i++) {
    const el = document.createElement('span');
    el.className = 'disordered-text';
    el.textContent = FRAGMENTS[Math.floor(Math.random() * FRAGMENTS.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = Math.random() * 100 + 'vh';
    el.style.transform = 'translate(-50%,-50%)';
    el.style.opacity = (0.4 + Math.random() * 0.4).toFixed(2);
    el.style.fontSize = '34px';
    const g = Math.floor(Math.random() * 3) * 50;
    el.style.color = 'rgb(' + g + ',' + g + ',' + g + ')';
    stage.appendChild(el);
  }
}

function startGameLoop() {
  if (S.gameLoopInterval) return;
  S.gameTime = 0;
  S.chaosLevel = 0;
  S.chaosGrowthRate = 0.15;
  S.gameLoopInterval = setInterval(() => {
    S.gameTime++;
    if (S.gameTime >= 240) {
      if (S.gameTime === 240) AudioManager.playAmbientLayer2('人声处理', 0.25);
      S.chaosGrowthRate += (S.gameTime * 0.0005);
      S.chaosLevel = Math.min(100, S.chaosLevel + S.chaosGrowthRate);
      generateTextObstruction(S.chaosLevel);
    }
    if (S.chaosLevel >= 100 && S.gameTime >= 240 + S.meltdownBuffer) {
      clearInterval(S.gameLoopInterval);
      S.gameLoopInterval = null;
      executeFinalMeltdown();
    }
  }, 1000);
}

// ===== Forget Mechanism =====
const FORGET_ITEMS = ['crayon', 'photo', 'yarn', 'medical_record', 'nightstand'];
function startForgetTimer() {
  if (S._forgetInterval) return;
  S._forgetWindowCount = 0;
  S._forgetInterval = setInterval(() => {
    const toReset = Math.min(S._forgetWindowCount, 2);
    if (toReset > 0) {
      const doneItems = FORGET_ITEMS.filter(name => {
        const st = S.items[name].st;
        return st === 'done' || st === 'unlocked';
      });
      for (let i = doneItems.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [doneItems[i], doneItems[j]] = [doneItems[j], doneItems[i]];
      }
      const pick = doneItems.slice(0, Math.min(toReset, doneItems.length));
      pick.forEach(name => { S.items[name].st = 'fresh'; });
      updHotspots();
    }
    S._forgetWindowCount = 0;
  }, 30000);
}
function onItemGuessed() {
  S._forgetWindowCount = (S._forgetWindowCount || 0) + 1;
  if (!S._forgetInterval) startForgetTimer();
  // Text Overlap Meltdown: reduce chaos + clear all text + extend play time
  S.chaosLevel = Math.max(0, S.chaosLevel - 25);
  S.meltdownBuffer += 10;
  document.querySelectorAll('.disordered-text').forEach(el => el.remove());
}

function doMainExit() {
  if (S.items.mirror.st !== 'done') {
    showDlg("I can't leave yet. There's something I need to do...", 2500);
    return;
  }
  // Mirror is done -> show door ending choice
  openModal('./assets/scenes/endings/door_open_true.png');
  modalHint.textContent = '';
  closeHint.textContent = '';

  var choiceDiv = document.createElement('div');
  choiceDiv.style.cssText = 'position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:40px;z-index:60;';

  var btnYes = document.createElement('button');
  btnYes.textContent = 'Escape';
  btnYes.style.cssText = 'padding:12px 40px;font-size:28px;font-family:STKaiti,KaiTi,serif;background:rgba(0,0,0,0.7);color:#fff;border:2px solid rgba(255,255,255,0.4);border-radius:8px;cursor:pointer;transition:background 0.2s;';
  btnYes.onmouseenter = function() { this.style.background = 'rgba(255,255,255,0.2)'; };
  btnYes.onmouseleave = function() { this.style.background = 'rgba(0,0,0,0.7)'; };

  var btnNo = document.createElement('button');
  btnNo.textContent = "Don't go out";
  btnNo.style.cssText = 'padding:12px 40px;font-size:28px;font-family:STKaiti,KaiTi,serif;background:rgba(0,0,0,0.7);color:#fff;border:2px solid rgba(255,255,255,0.4);border-radius:8px;cursor:pointer;transition:background 0.2s;';
  btnNo.onmouseenter = function() { this.style.background = 'rgba(255,255,255,0.2)'; };
  btnNo.onmouseleave = function() { this.style.background = 'rgba(0,0,0,0.7)'; };

  btnYes.onclick = function(e) {
    e.stopPropagation();
    choiceDiv.remove();
    closeModal();
    // Show door image as ending scene overlay
    $('endingBg').style.backgroundImage = "url('./assets/scenes/endings/door_open_true.png')";
    $('endingOverlay').classList.add('show');
    executeFinalMeltdown();
  };

  btnNo.onclick = function(e) {
    e.stopPropagation();
    choiceDiv.remove();
    closeModal();
  };

  choiceDiv.appendChild(btnYes);
  choiceDiv.appendChild(btnNo);
  modalOv.appendChild(choiceDiv);

  modalOv.onclick = null;
}

function executeFinalMeltdown() {
  document.body.style.pointerEvents = "none";
  if (S.gameLoopInterval) { clearInterval(S.gameLoopInterval); S.gameLoopInterval = null; }
  if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval = null; }
  AudioManager._fadeAmbientTo(0, 5, 0);
  setTimeout(() => { AudioManager.stopAmbient(); }, 5000);
  // Fade ending background to black (reveals overlay's #000 bg)
  $('endingBg').style.transition = 'opacity 10s ease';
  $('endingBg').style.opacity = '0';
  setTimeout(() => { renderFinalStaticEpilogue(); }, 10000);
}

function renderFinalStaticEpilogue() {
  const gc = $('game-canvas');
  gc.style.display = 'none';
  $('endingOverlay').classList.remove('show');
  $('endingBg').style.opacity = '1';
  $('endingBg').style.transition = '';
  const ep = $('epilogue-container');
  $('epilogueTime').textContent = 'Chen Huijun resisted forgetting for: ' + S.minutes + 'min ' + S.seconds + 's';
  ep.style.display = 'flex';
  // Play ending voiceover
  if (S.sound) {
    try {
      const voice = new Audio('./assets/audio/结局人声.mp4');
      voice.volume = 0.5;
      voice.play().catch(() => {});
    } catch(e) {}
  }
}
function doUnderSink() {
  const item = S.items.under_sink;
  if (item.st !== 'fresh') return;
  openModal('./assets/items/washroom/under_sink.png');
  if (S.inv.includes('broom')) {
    modalHint.textContent = 'Sweep it out with the broom...';
    if (!S.inv.includes('key')) { S.inv.push('key'); updInv(); }
    item.st = 'done';
    closeHint.textContent = '';
    modalOv.onclick = function(e) {

      closeModal(); hideDlg();
      updHotspots();
      modalOv.onclick = null;
    };
  } else {
    modalHint.textContent = '';
    showDlg('In the pitch black, I can vaguely see a glint of metal.');
    closeHint.textContent = '';
    modalOv.onclick = function(e) {

      closeModal(); hideDlg();
      modalOv.onclick = null;
    };
  }
}

function doTap() {
  const item = S.items.tap;
  if (item.st !== 'fresh') return;
  AudioManager.playClick('tick');
  showDlgSequence(['There is nothing that needs to be washed right now.'], function() {
    item.st = 'done';
    updHotspots();
  });
}

function doMirror() {
  const item = S.items.mirror;
  if (item.st !== 'fresh') return;

  if (S.gameTime < 180 || S.chaosLevel <= 40) {
    // Fog not cleared yet: blurred mirror, faint monologue
    openModal('./assets/items/washroom/vanity_mirror.png');
    modalImg.style.filter = 'blur(6px) brightness(0.7)';
    modalHint.textContent = "The mirror is covered in a thick fog... I can't see who I am.";
    closeHint.textContent = '';
    showDlg("I can barely make out a silhouette... I still can't remember. Maybe I should look at the other things in the room first.", 3000);
    modalOv.onclick = function(e) {
      modalImg.style.filter = '';
      closeModal(); hideDlg();
      modalOv.onclick = null;
    };
    return;
  }

  // Fog cleared: mirror visible, recognize self
  openModal('./assets/items/washroom/vanity_mirror.png');
  modalImg.style.filter = '';
  modalHint.textContent = "I can see my own face clearly now...";
  closeHint.textContent = '';
  showDlg("...It's me. Chen Huijun. I remember now.");
  modalOv.onclick = function(e) {
    modalImg.style.filter = '';
    item.st = 'done';
    updHotspots();
    closeModal(); hideDlg();
    modalOv.onclick = null;
    onItemGuessed();
  };
}
function doBroomItem() {
  const item = S.items.broom_item;
  if (item.st !== 'fresh') return;
  AudioManager.playClick('tick');
  openModal(null);
  modalImg.style.display = 'none';
  modalHint.textContent = 'An old broom in the corner...';
  showDlgSequence(['I feel like this could be useful.'], function() {
    S.inv.push('broom'); updInv();
    item.st = 'done';
    closeModal();
    hideDlg();
    modalImg.style.display = '';
    // Change scene background after broom is taken
    const wrLayer = $('wrSceneLayer');
    if (wrLayer) wrLayer.style.backgroundImage = "url('./assets/scenes/washroom/washroom2.png')";
    updHotspots();
    modalOv.onclick = null;
  });
}

function doBackToLivingroom() {
  switchToScene('livingroom', 'Back to living room...');
}

function doToWashroom() {
  switchToScene('washroom', 'Going to washroom...');
}

// ===== Study Interactions =====
const doMedicalRecord = initGuessItem({
  itemObj: S.items.medical_record,
  blurredSrc: './assets/items/study/medical_record_blurred.png',
  clearSrc: './assets/items/study/medical_record.png',
  memorySrc: './assets/memories/memory4_diagnosis.png',
  monologueLines: ["They are placed in the most conspicuous spot in this room."],
  memoryLines: ["Doctor: Chen Huijun, Alzheimer's disease, mid-to-late stage. Current medications can only delay it; there is no cure.", "Xiaoxue: Doctor, my mom used to have an amazing memory. She could remember bills from thirty years ago down to the penny...", "???: They keep saying a name I don't recognize, yet that report sheet clearly bears the same photo from my bankbook.", "Xiaoxue: Mom, don't be afraid. From now on, I'll set an alarm every day to remind you to take your medicine. It's okay if we can't remember things anymore.", "???: Staring at my daughter's tear-reddened eyes, I parted my lips, but I couldn't even piece together a single word to comfort her."],
  opts: [
    { lbl: 'Medical Record', val: 'medical' },
    { lbl: 'Diary', val: 'diary' },
    { lbl: 'Perfume Bottle', val: 'perfume' }
  ],
  correctVal: 'medical',
  correctLabel: 'Medical Record',
  flickerLabel: 'Diagnosis',
  hintPrompt: 'What is this...?',
  chaosPhrases: ['medical record', 'diary', 'perfume', 'Alzheimer', 'diagnosis', 'hippocampus', 'atrophy', 'don\'t forget medicine', 'Chen Huijun', 'incurable', 'memory loss', 'brain']
});

function doBooks() {
  const item = S.items.books;
  if (item.st !== 'fresh') return;
  AudioManager.playClick('tick');
  dismissableDlg('So many books. Have I read all of these?');
  item.st = 'done';
  updHotspots();
}

function doBackToBedroomFromStudy() {
  switchToScene('bedroom', 'Back to bedroom...');
}

function doBackToLivingroomFromStudy() {
  switchToScene('livingroom', 'Back to living room...');
}

// ===== Hotspot events =====
function handleClick(item, scene) {
  if (scene && scene !== S.currentScene) return;
  const map = {
    clock: doClock, crayon: doCrayon, nightstand: doNightstand, door: doDoor,
    photo: doPhoto, yarn: doYarn, height: doHeight, portrait: doPortrait, mahjong: doMahjong,
    backToBedroom: doBackToBedroom, toStudy: doToStudy, mainExit: doMainExit,
    toWashroom: doToWashroom,
    under_sink: doUnderSink, tap: doTap, mirror: doMirror, broom_item: doBroomItem, backToLivingroom: doBackToLivingroom,
    studyDoor: doStudyDoor,
    medical_record: doMedicalRecord, books: doBooks, backToBedroomFromStudy: doBackToBedroomFromStudy, backToLivingroomFromStudy: doBackToLivingroomFromStudy
  };
  const fn = map[item];
  if (fn) fn();
  AudioManager.playClick('tick');
  // Accumulate global chaos on every arrow interaction
  if (S.chaosCleared) {
    S.chaosCleared = false;
  } else {
    addGlobalChaos(2 + Math.floor(Math.random() * 6));
  }
}

document.querySelectorAll('.hotspot').forEach(el => {
  el.addEventListener('click', function(e) {
    e.stopPropagation();
    handleClick(this.dataset.item, this.dataset.scene);
  });
});

document.querySelectorAll('.lr-hotspot').forEach(el => {
  el.addEventListener('click', function(e) {
    e.stopPropagation();
    handleClick(this.dataset.item, this.dataset.scene);
  });
});

document.querySelectorAll('.nav-arrow').forEach(el => {
  el.addEventListener('click', function(e) {
    e.stopPropagation();
    handleClick(this.dataset.item);
  });
});

// ===== Settings =====
$('btnSettings').onclick = () => settings.classList.add('show');
$('btnCloseSettings').onclick = () => settings.classList.remove('show');
$('btnRestart').onclick = () => location.reload();
S.sound = true;
S.recallMuted = false;

// ===== Sound icon =====
function updateSoundUI() {
  $('sndToggleAmbient').textContent = 'Ambient: ' + (S.ambientMuted ? 'Off' : 'On');
  $('sndToggleRecall').textContent = 'Recall: ' + (S.recallMuted ? 'Off' : 'On');
  $('sndToggleAll').textContent = 'All Sound: ' + (S.sound ? 'On' : 'Off');
  $('btnSound').style.opacity = (S.sound && !S.ambientMuted) ? '1' : '0.5';
}
$('btnSound').onclick = function() { soundMenu.classList.add('show'); updateSoundUI(); };
$('btnCloseSound').onclick = function() { soundMenu.classList.remove('show'); };
$('sndToggleAmbient').onclick = function() {
  S.ambientMuted = !S.ambientMuted;
  const muted = S.ambientMuted || !S.sound;
  if (AudioManager._ambientEl) AudioManager._ambientEl.muted = muted;
  if (AudioManager._ambientEl2) AudioManager._ambientEl2.muted = muted;
  updateSoundUI();
};
$('sndToggleRecall').onclick = function() {
  S.recallMuted = !S.recallMuted;
  updateSoundUI();
};
$('sndToggleAll').onclick = function() {
  S.sound = !S.sound;
  AudioManager.toggleMute();
  const muted = !S.sound || S.ambientMuted;
  if (AudioManager._ambientEl) AudioManager._ambientEl.muted = muted;
  if (AudioManager._ambientEl2) AudioManager._ambientEl2.muted = muted;
  updateSoundUI();
};

// ===== Scaling =====
function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const scale = Math.min(w / 1920, h / 1080);
  const canvas = $('game-canvas');
  const wrapper = $('game-wrapper');
  canvas.style.transform = 'scale(' + scale + ')';
  wrapper.style.width = Math.floor(1920 * scale) + 'px';
  wrapper.style.height = Math.floor(1080 * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ===== Title Screen =====
var tsInited = false;
function startNewGame() {
  if (tsInited) return;
  tsInited = true;
  startGameLoop();
  S.seconds = 0;
  S.minutes = 0;
  S.timerInterval = setInterval(() => {
    S.seconds++;
    if (S.seconds >= 60) { S.seconds = 0; S.minutes++; }
    timeDisp.textContent =
      String(S.minutes).padStart(2,'0') + ':' + String(S.seconds).padStart(2,'0');
    if (S.minutes >= 6) {
      const sd = $('sceneDarken');
      if (sd && sd.style.opacity !== '1') sd.style.opacity = '1';
    }
  }, 1000);
  AudioManager.init();
  AudioManager.playClick('menu');
  AudioManager.playAmbient('环境音1', 0.3);
  var ts = $('titleScreen');
  dlgBox.style.zIndex = '650';
  ts.classList.add('hidden');
  $('instructionOverlay').classList.remove('show');
  setTimeout(function() { ts.style.display = 'none'; }, 800);

  // Show black overlay for awakening fade-in
  var blackOv = $('blackOverlay');
  blackOv.style.display = 'block';
  blackOv.style.opacity = '1';

  setTimeout(function() {
    showDlgSequence([
      'Who am I?',
      'Where did I just drift away to?',
      'The inside of my head is wide and empty, like a cleared-out old warehouse.',
      'Nothing to grasp, nothing to remember.',
    ], function() {
      // Show the trigger line, start fade
      showDlg("It's time for me to wake up.");
      closeHint.textContent = 'Click to continue';
      blackOv.style.opacity = '0';

      var handler = function(e) {
        document.removeEventListener('click', handler);
        hideDlg();
        setTimeout(function() { blackOv.style.display = 'none'; }, 2600);
        showDlgSequence([
          '...Awake.',
          'My eyelids are so heavy; everything I see looks dusty and grey.',
          'Is this the bedroom?',
          'Tick. Tock.',
          'The clock hands are moving so pressingly.',
          '......',
          "Still, I can't remember anything...",
          'I should explore the things in this room.',
        ]);
      };
      setTimeout(function() { document.addEventListener('click', handler); }, 50);
    });
  }, 800);
}
$('btnNewGame').addEventListener('click', startNewGame);
$('titleScreen').addEventListener('click', function(e) {
  if (e.target.id === 'btnNewGame') startNewGame();
});
$('btnExitGame').addEventListener('click', function() { window.close(); });
$('btnInstruction').addEventListener('click', function() { $('instructionOverlay').classList.add('show'); });

// ===== Init =====
updHotspots();
updInv();
</script>

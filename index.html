<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Embers</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Microsoft YaHei', 'PingFang SC', 'STKaiti', serif;
  overflow: hidden;
}
#game-wrapper {
  position: relative;
  overflow: hidden;
  background: #0a0a0a;
}
#game-canvas {
  position: relative;
  width: 1920px;
  height: 1080px;
  transform-origin: 0 0;
  overflow: hidden;
  background: #111;
}

/* Scene */
.scene-layer {
  position: absolute;
  inset: 0;
  background: url('./assets/scenes/bedroom/bedroom.png') center/cover no-repeat;
  transition: filter 0.5s;
}
.scene-layer.fear {
  background-image: url('./assets/scenes/bedroom/bedroom_fear.png');
}

/* Scene visibility */
.scene { display: none; }
.scene.active { display: block; }

/* Hotspots */
.hotspot {
  position: absolute;
  cursor: pointer;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s, transform 0.15s;
}
.hotspot:hover { transform: scale(1.2); }
.hotspot.hidden { opacity: 0; pointer-events: none; }
.hotspot img {
  max-width: 100%;
  max-height: 100%;
  pointer-events: none;
}
.hotspot.exit:hover { transform: scale(1.7); }

/* Living room text hotspots */
.lr-hotspot {
  position: absolute;
  cursor: pointer;
  z-index: 10;
  font-family: 'STKaiti', 'KaiTi', serif;
  font-size: 22px;
  color: rgba(220,200,180,0.7);
  text-shadow: 0 0 12px rgba(0,0,0,0.8), 0 2px 4px rgba(0,0,0,0.6);
  transition: opacity 0.5s, color 0.3s;
  white-space: nowrap;
  pointer-events: auto;
}
.lr-hotspot:hover { color: rgba(255,230,200,1); }
.lr-hotspot.hidden { opacity: 0; pointer-events: none; }
.lr-hotspot.exit-text {
  font-size: 18px;
  color: rgba(200,180,160,0.4);
}
.lr-hotspot.exit-text:hover { color: rgba(255,255,255,0.7); }

/* Navigation arrows (left/right) */
.nav-arrow {
  position: absolute;
  cursor: pointer;
  z-index: 10;
  transition: opacity 0.3s, transform 0.15s;
}
.nav-arrow:hover { transform: scale(1.2); }
.nav-arrow.hidden { opacity: 0; pointer-events: none; }
.nav-arrow img { pointer-events: none; }

/* Top-left UI */
.ui-top {
  position: absolute;
  left: 32px; top: 32px;
  display: flex;
  align-items: center;
  gap: 32px;
  z-index: 20;
}
.ui-top .uibtn {
  width: 100px;
  height: 100px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.ui-top .uibtn:hover { opacity: 0.8; }
.ui-top .uibtn img { width: 100%; height: 100%; }
.ui-top .time-box {
  width: 200px;
  height: 100px;
  position: relative;
}
.ui-top .time-box img { width: 100%; height: 100%; }
.ui-top .time-box span {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #ffe;
  font-size: 34px;
  font-family: 'Courier New', monospace;
  letter-spacing: 2px;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
}

/* Right toolbar */
.ui-toolbar {
  position: absolute;
  right: 32px;
  top: 342px;
  width: 164px;
  height: 588px;
  z-index: 20;
  pointer-events: none;
}
.ui-toolbar .tb-bg { width: 100%; height: 100%; }
.ui-toolbar .tb-items {
  position: absolute;
  left: 12px; right: 12px; top: 12px; bottom: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.ui-toolbar .tb-items .slot {
  flex: 1;
  background: rgba(0,0,0,0.35);
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
}
.ui-toolbar .tb-items .slot img {
  max-width: 65%;
  max-height: 65%;
  opacity: 0.8;
}

/* Bottom dialog */
.ui-dialog {
  position: absolute;
  left: 226px;
  bottom: 40px;
  width: 1468px;
  min-height: 130px;
  z-index: 600;
  display: none;
}
.ui-dialog.show { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.ui-dialog .dlg-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}
.ui-dialog .dlg-continue {
  position: absolute;
  right: 25px;
  bottom: 25px;
  width: 61px;
  height: 42px;
  transform: scale(0.5);
  transform-origin: right bottom;
  pointer-events: none;
}
.ui-dialog .dlg-text {
  position: relative;
  padding: 28px 60px;
  color: #2a1a0a;
  font-size: 34px;
  font-family: 'STKaiti', 'KaiTi', '妤蜂綋', serif;
  line-height: 1.7;
  min-height: 130px;
  text-shadow: 0 1px 2px rgba(255,255,255,0.25);
}

/* Modal overlay */
.modal-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.78);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.modal-overlay.show { display: flex; animation: fadeIn 0.25s ease; }
.modal-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 861px;
  height: 526px;
  cursor: default;
  background: transparent;
}
.modal-box .item-img {
  max-width: 820px;
  max-height: 480px;
  border-radius: 10px;
  box-shadow: 0 10px 50px rgba(0,0,0,0.7);
  object-fit: contain;
}
.modal-box .item-img.transition {
  transition: opacity 0.4s;
}

.guess-area {
  margin-top: 28px;
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
}
.guess-area .opt {
  padding: 12px 44px;
  font-size: 26px;
  font-family: inherit;
  background: rgba(0,0,0,0.55);
  color: #f0e8e0;
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  min-width: 130px;
  text-align: center;
}
.guess-area .opt:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.5);
  transform: scale(1.06);
}
.guess-area .opt.correct {
  background: rgba(46, 125, 50, 0.7);
  border-color: #66bb6a;
}
.guess-area .opt.wrong {
  background: rgba(183, 28, 28, 0.7);
  border-color: #ef5350;
}

.modal-hint {
  margin-top: 18px;
  font-size: 28px;
  font-family: 'STKaiti', 'KaiTi', serif;
  color: #ffd699;
  min-height: 40px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.9);
}
.modal-closehint {
  margin-top: 12px;
  font-size: 18px;
  color: rgba(255,255,255,0.35);
}

/* Chaos phase 2: character spans */
.chaos-char {
  display: inline-block;
  transition: all 0.2s ease;
  position: relative;
}
.chaos-char.repel {
  transform: translateX(50px);
  opacity: 0.3;
}
.opt.flicker {
  animation: flickerText 0.3s infinite alternate;
}
@keyframes flickerText {
  0% { opacity: 1; }
  100% { opacity: 0.3; filter: blur(1px); }
}

/* Screen tear effect */
.screen-tear {
  animation: tearEffect 0.15s ease 3;
}
@keyframes tearEffect {
  0% { clip-path: inset(0 0 0 0); transform: translateX(0); }
  25% { clip-path: inset(10% 0 20% 0); transform: translateX(4px); }
  50% { clip-path: inset(40% 0 5% 0); transform: translateX(-3px); }
  75% { clip-path: inset(25% 0 35% 0); transform: translateX(5px); }
  100% { clip-path: inset(0 0 0 0); transform: translateX(0); }
}

/* Chaos phase 3: Brownian option (plain text, no box) */
.opt.brownian {
  position: fixed !important;
  z-index: 70;
  cursor: pointer;
  font-size: 20px;
  font-family: 'STKaiti', 'KaiTi', serif;
  background: none;
  border: none;
  padding: 0;
  margin: 0;
  color: rgba(200,180,160,0.7);
  text-shadow: 0 0 8px rgba(0,0,0,0.5);
  white-space: nowrap;
}
.opt.brownian:hover {
  color: rgba(255,220,180,0.95);
  text-shadow: 0 0 16px rgba(255,200,100,0.3);
}
.opt.brownian.crayon-target {
  color: rgba(220,200,180,0.85);
}

/* Phase 3 monologue spam */
.chaos-spam {
  position: absolute;
  inset: 0;
  z-index: 55;
  pointer-events: none;
  overflow: hidden;
  background: rgba(0,0,0,0.8);
}
.chaos-spam .spam-text {
  position: absolute;
  font-family: 'STKaiti', 'KaiTi', serif;
  font-size: 22px;
  color: rgba(200,180,160,0.6);
  white-space: nowrap;
  opacity: 0;
  animation: spamIn 0.6s ease forwards;
}
@keyframes spamIn {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

/* Memory overlay */
.memory-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 60;
  display: none;
  align-items: center;
  justify-content: center;
}
.memory-overlay.show { display: flex; }
.memory-overlay img {
  max-width: 80%;
  max-height: 80%;
  border-radius: 10px;
  box-shadow: 0 10px 80px rgba(0,0,0,0.9);
  animation: memIn 0.6s ease;
}
@keyframes memIn {
  0% { opacity: 0; transform: scale(0.92); }
  100% { opacity: 1; transform: scale(1); }
}

/* Settings */
.settings-menu {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.82);
  z-index: 70;
  display: none;
  align-items: center;
  justify-content: center;
}
.settings-menu.show { display: flex; }
.settings-panel {
  background: #fff;
  padding: 44px 64px;
  border-radius: 16px;
  text-align: center;
  min-width: 360px;
  border: 9px solid #000;
}
.settings-panel h2 {
  color: #000;
  font-size: 30px;
  margin-bottom: 28px;
  letter-spacing: 6px;
}
.settings-panel button {
  display: block;
  width: 100%;
  padding: 14px 0;
  margin: 10px 0;
  font-size: 22px;
  font-family: inherit;
  background: #fff;
  color: #000;
  border: 6px solid #000;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
}
.settings-panel button:hover { background: #eee; }
.settings-panel .s-close {
  margin-top: 18px;
}

/* Sound menu */
.sound-menu {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.82);
  z-index: 70;
  display: none;
  align-items: center;
  justify-content: center;
}
.sound-menu.show { display: flex; }
.sound-panel {
  background: #fff;
  padding: 44px 64px;
  border-radius: 16px;
  text-align: center;
  min-width: 360px;
  border: 9px solid #000;
}
.sound-panel h2 {
  color: #000;
  font-size: 30px;
  margin-bottom: 28px;
  letter-spacing: 6px;
}
.sound-panel button {
  display: block;
  width: 100%;
  padding: 14px 0;
  margin: 10px 0;
  font-size: 22px;
  font-family: inherit;
  background: #fff;
  color: #000;
  border: 6px solid #000;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
}
.sound-panel button:hover { background: #eee; }
.sound-panel .s-close {
  margin-top: 18px;
}

/* Scene transition */
.scene-fade {
  position: absolute;
  inset: 0;
  background: #000;
  z-index: 80;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.scene-fade.show { opacity: 1; pointer-events: auto; }
}
@keyframes pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* ===== Title Screen ===== */
.title-screen {
  position: absolute;
  inset: 0;
  z-index: 90;
  transition: opacity 0.8s ease;
  background: url('./assets/scenes/begin/游戏开始界面.png') center/100% 100% no-repeat;
  pointer-events: auto;
}
.title-screen.hidden {
  opacity: 0;
  pointer-events: none;
}
.title-screen .btn-img {
  position: absolute;
  cursor: pointer;
  z-index: 1;
  transition: opacity 0.2s, transform 0.15s;
  display: block;
  width: 354px;
  height: 94px;
}
.title-screen .btn-img:hover { opacity: 0.85; transform: scale(1.04); }
.title-screen .btn-img:active { transform: scale(0.96); }
/* ===== Instruction Overlay ===== */
.instruction-overlay {
  position: absolute;
  inset: 0;
  z-index: 95;
  display: none;
  cursor: pointer;
  background: rgba(0,0,0,0.85);
}
.instruction-overlay.show { display: flex; align-items: center; justify-content: center; }
.instruction-overlay img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* ===== Ending Overlay ===== */
.ending-overlay {
  position: absolute;
  inset: 0;
  z-index: 100;
  display: none;
  background: #000;
}
.ending-overlay.show { display: block; }
.ending-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  transition: opacity 1s ease;
}
.ending-flare {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0;
  background: radial-gradient(circle at center, rgba(255,255,240,0.6) 0%, rgba(255,255,255,0.2) 40%, transparent 70%);
  animation: flareExpand 3s ease forwards;
}
@keyframes flareExpand {
  0% { opacity: 0; transform: scale(0.2); }
  40% { opacity: 1; transform: scale(1.2); }
  100% { opacity: 1; transform: scale(3); }
}
.ending-text {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 100px 160px;
  opacity: 0;
  transition: opacity 1s ease;
  z-index: 2;
}
.ending-text.show { opacity: 1; }
.ending-text .line {
  color: #f0e8e0;
  font-family: 'STKaiti', 'KaiTi', serif;
  font-size: 34px;
  line-height: 2;
  text-shadow: 0 2px 20px rgba(0,0,0,0.6);
  opacity: 0;
  animation: lineIn 0.8s ease forwards;
}
.ending-text .line.bad-news {
  font-family: 'SimSun', 'STSong', '瀹嬩綋', serif;
  font-size: 26px;
  color: #aaa;
  line-height: 1.8;
  text-align: left;
  max-width: 800px;
}
@keyframes lineIn {
  0% { opacity: 0; transform: translateY(16px); }
  100% { opacity: 1; transform: translateY(0); }
}
.ending-credits {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 2s ease;
  z-index: 3;
}
.ending-credits.show { opacity: 1; }
.ending-credits span {
  color: #ccc;
  font-size: 24px;
  letter-spacing: 10px;
  margin: 6px 0;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-12px); }
  50% { transform: translateX(12px); }
  75% { transform: translateX(-6px); }
}

/* ===== Meltdown (single ending) ===== */
.meltdown-active {
  filter: blur(20px);
  opacity: 0;
  transition: filter 10s ease, opacity 10s ease;
  pointer-events: none !important;
}
#game-canvas.meltdown-active { background: #fff !important; }
/* ===== Chaos Text Overlap ===== */
.disordered-text {
  position: fixed;
  pointer-events: none;
  font-family: 'STKaiti', 'KaiTi', serif;
  white-space: nowrap;
  z-index: 12;
  mix-blend-mode: multiply;
  user-select: none;
}
/* ===== Final Meltdown ===== */
.final-fade-to-black {
  transition: opacity 10s ease !important;
  opacity: 0 !important;
}
/* ===== Epilogue Container ===== */
#epilogue-container {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: #fff;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.epilogue-text-wrapper {
  text-align: center;
  padding: 40px;
  opacity: 0;
  animation: epiFadeIn 3s ease forwards;
}
@keyframes epiFadeIn {
  to { opacity: 1; }
}
.epilogue-text-wrapper .main-sentence {
  color: #333;
  font-family: 'STKaiti', 'KaiTi', serif;
  font-size: 38px;
  line-height: 2;
  margin-bottom: 24px;
}
.epilogue-text-wrapper .data-sentence {
  color: #666;
  font-family: 'STKaiti', 'KaiTi', serif;
  font-size: 24px;
  margin-bottom: 16px;
  letter-spacing: 2px;
}
.epilogue-text-wrapper .sub-sentence {
  color: #999;
  font-family: 'STKaiti', 'KaiTi', serif;
  font-size: 18px;
  font-style: italic;
}
</style>
</head>
<body>
<div id="game-wrapper">
<div id="game-canvas">

  <!-- ===== SCENE: Bedroom ===== -->
  <div class="scene active" id="sceneBedroom">
    <div class="scene-layer" id="sceneLayer">
      <img src="./assets/items/bedroom/clock_blurred.png" alt="" style="position:absolute;left:971px;top:207px;width:440px;pointer-events:none;">
    </div>

    <!-- Clock hotspot -->
    <div class="hotspot" id="hsClock" style="left:1148px;top:125px;width:76px;height:76px;" data-item="clock" data-scene="bedroom">
      <img src="./assets/ui/arrow_black.png" alt="Clock" style="transform:rotate(-46.85deg) scale(1.7)">
    </div>

    <!-- Crayon hotspot -->
    <div class="hotspot" id="hsCrayon" style="left:948.55px;top:571.55px;width:66px;height:66px;" data-item="crayon" data-scene="bedroom">
      <img src="./assets/ui/arrow_black.png" alt="Crayon" style="transform:rotate(-51deg) scale(1.7)">
    </div>

    <!-- Nightstand hotspot -->
    <div class="hotspot" id="hsNightstand" style="left:821px;top:739px;width:66px;height:66px;" data-item="nightstand" data-scene="bedroom">
      <img src="./assets/ui/arrow_black.png" alt="Nightstand" style="transform:rotate(29.35deg) scaleX(-1) scale(1.7)">
    </div>

    <!-- Exit door to living room -->
    <div class="hotspot exit" id="hsDoorR" style="left:1788px;top:948px;width:90px;height:90px;" data-item="door" data-scene="bedroom">
      <img src="./assets/ui/arrow_white_exit.png" alt="Exit">
    </div>

    <!-- Study door (bottom-left) -->
    <div class="nav-arrow" id="hsStudyDoor" style="left:32px;top:948px;width:80px;height:80px;" data-item="studyDoor">
      <img src="./assets/ui/arrow_white_exit.png" alt="Study" style="transform:scaleX(-1);width:100%;height:100%;">
    </div>
  </div>

  <!-- ===== SCENE: Living Room ===== -->
  <div class="scene" id="sceneLivingroom">
    <div class="scene-layer" style="background-image:url('./assets/scenes/livingroom/livingroom.png');"></div>

    <!-- LR item: Mahjong -->
    <div class="hotspot" id="hsMahjong" style="left:282px;top:505px;width:60px;height:60px;" data-item="mahjong" data-scene="livingroom">
      <img src="./assets/ui/arrow_black.png" alt="" style="transform:scale(1.7)">
    </div>

    <!-- LR item: Photo -->
    <div class="hotspot" id="hsPhoto" style="left:356px;top:198px;width:60px;height:60px;" data-item="photo" data-scene="livingroom">
      <img src="./assets/ui/arrow_black.png" alt="" style="transform:scale(1.7)">
    </div>

    <!-- LR item: Height -->
    <div class="hotspot" id="hsHeight" style="left:960px;top:399px;width:60px;height:60px;" data-item="height" data-scene="livingroom">
      <img src="./assets/ui/arrow_black.png" alt="" style="transform:scale(1.7)">
    </div>

    <!-- LR item: Portrait -->
    <div class="hotspot" id="hsPortrait" style="left:1374px;top:191px;width:60px;height:60px;" data-item="portrait" data-scene="livingroom">
      <img src="./assets/ui/arrow_black.png" alt="" style="transform:scale(1.7)">
    </div>

    <!-- LR item: Yarn -->
    <div class="hotspot" id="hsYarn" style="left:1510px;top:722px;width:60px;height:60px;" data-item="yarn" data-scene="livingroom">
      <img src="./assets/ui/arrow_black.png" alt="" style="transform:scale(1.7)">
    </div>

    <!-- LR doors: Back to bedroom -->
    <div class="nav-arrow" id="lrDoorBedroom" style="left:32px;top:948px;width:80px;height:80px;" data-item="backToBedroom">
      <img src="./assets/ui/arrow_white_exit.png" alt="Back" style="transform:scaleX(-1);width:100%;height:100%;">
    </div>

    <!-- LR door: To washroom -->
    <div class="nav-arrow" id="lrDoorWashroom" style="left:1788px;top:948px;width:80px;height:80px;" data-item="toWashroom">
      <img src="./assets/ui/arrow_white_exit.png" alt="Washroom" style="width:100%;height:100%;">
    </div>

    <!-- LR door: To study (locked) -->
    <div class="lr-hotspot exit-text" id="lrDoorStudy" style="right:120px;top:350px;" data-item="toStudy">Locked Study</div>

    <!-- LR door: Main exit (locked) -->
    <div class="nav-arrow" id="lrDoorExit" style="left:726px;top:830px;width:90px;height:90px;" data-item="mainExit">
      <img src="./assets/ui/arrow_white_exit.png" alt="Exit" style="transform:rotate(-90deg);width:100%;height:100%;">

<script>
// ===== Audio Manager (绮剧畝鐗? 浠呯偣鍑?鍥炲繂/鐗规畩鐗╁搧闊虫晥) =====
const AudioManager = {
  ctx: null,
  buffers: {},
  masterGain: null,
  initialized: false,
  _muted: false,

  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (this.ctx.state === 'suspended') this.ctx.resume();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 1;
      this.masterGain.connect(this.ctx.destination);
      this._preload();
      this.initialized = true;
    } catch(e) { console.warn('Audio init failed:', e); }
  },

  async _preload() {
    const files = ['ambient_clock','click_menu','click_tick','recall_crayon','recall_photo','recall_pill','recall_wedding','recall_yarn'];
    for (const name of files) {
      try {
        const r = await fetch('./assets/audio/' + name + '.mp3');
        const buf = await r.arrayBuffer();
        this.buffers[name] = await this.ctx.decodeAudioData(buf);
      } catch(e) {
        // fetch failed (e.g. file:// protocol) 鈥?cache Audio element instead
        try {
          const audio = new Audio('./assets/audio/' + name + '.mp3');
          audio.preload = 'auto';
          audio.load();
          if (!this._audioEls) this._audioEls = {};
          this._audioEls[name] = audio;
        } catch(e2) {}
      }
    }
  },

  _noise(len) {
    const sr = this.ctx.sampleRate;
    const buf = this.ctx.createBuffer(1, sr * len, sr);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    return buf;
  },

  _playAudioEl(name, vol) {
    if (this._muted) return;
    const el = new Audio('./assets/audio/' + name + '.mp3');
    el.volume = vol !== undefined ? vol : 0.5;
    el.play().catch(() => {});
  },

  play(name, vol) {
    if (this.buffers[name]) {
      if (!this.ctx) return;
      if (this.ctx.state === 'suspended') this.ctx.resume();
      const src = this.ctx.createBufferSource();
      src.buffer = this.buffers[name];
      const g = this.ctx.createGain();
      g.gain.value = vol !== undefined ? vol : 0.5;
      src.connect(g).connect(this.masterGain);
      src.start(0);
    } else {
      this._playAudioEl(name, vol);
    }
  },

  // 鐐瑰嚮闊虫晥
  playClick(type) {
    if (!this.ctx || this._muted) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    const file = type === 'menu' ? 'click_menu' : 'click_tick';
    const vol = type === 'menu' ? 0.5 : 0.3;
    // 1) Web Audio API buffer
    if (this.buffers[file]) { this.play(file, vol); return; }
    // 2) HTMLAudioElement (works on file://)
    try {
      const audio = new Audio('./assets/audio/' + file + '.mp3');
      audio.volume = vol; audio.play().catch(() => {});
    } catch(e) {
      // 3) oscillator fallback
      const osc = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = type === 'menu' ? 800 : 500;
      g.gain.setValueAtTime(0.15, this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.06);
      osc.connect(g).connect(this.masterGain);
      osc.start(); osc.stop(this.ctx.currentTime + 0.07);
    }
  },

  // 鍥炲繂瑙﹀彂闊虫晥
  playRecall(name) {
    if (!this.ctx || this._muted || S.recallMuted) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    // Duck ambient layers to 30% (smooth 0.4s)
    this._fadeAmbientTo(this._ambientOrigVol * 0.3, 0.4,
      this._ambientOrigVol2 !== undefined ? this._ambientOrigVol2 * 0.3 : undefined);
    const map = { crayon:'recall_crayon', photo:'recall_photo', yarn:'recall_yarn', medical:'recall_pill', ring:'recall_wedding' };
    const file = map[name];
    if (!file) return;
    // Clear previous recall tracking
    this._recallGain = null; this._recallSrc = null; this._recallEl = null;
    // 1) Web Audio API buffer (works on http://)
    if (this.buffers[file]) {
      this._recallGain = this.ctx.createGain();
      this._recallGain.gain.value = 0.35;
      this._recallSrc = this.ctx.createBufferSource();
      this._recallSrc.buffer = this.buffers[file];
      this._recallSrc.connect(this._recallGain).connect(this.masterGain);
      this._recallSrc.start(0);
      return;
    }
    // 2) HTMLAudioElement (works on file://)
    try {
      this._recallEl = new Audio('./assets/audio/' + file + '.mp3');
      this._recallEl.volume = 0.35;
      this._recallEl.play().catch(() => {});
      return;
    } catch(e) {}
    // 3) oscillator fallback
    [220, 330, 440].forEach((freq, i) => {
      const osc = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      g.gain.setValueAtTime(0, this.ctx.currentTime + i * 0.15);
      g.gain.linearRampToValueAtTime(0.12, this.ctx.currentTime + i * 0.15 + 0.3);
      g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 2);
      osc.connect(g).connect(this.masterGain);
      osc.start(this.ctx.currentTime + i * 0.15);
      osc.stop(this.ctx.currentTime + 3);
    });
  },

  // 鐜闊抽煶閲忔粦鍔ㄨ繃娓?/ Smooth ambient volume transition (all layers)
  _fadeAmbientTo(targetVol, duration, targetVol2) {
    [this._ambientEl, this._ambientEl2].forEach((el, i) => {
      if (!el) return;
      const tgt = i === 1 && targetVol2 !== undefined ? targetVol2 : targetVol;
      const startVol = el.volume;
      const start = Date.now();
      const tick = () => {
        try {
          if (!el) return;
          const t = (Date.now() - start) / 1000;
          if (t >= duration) { el.volume = tgt; return; }
          el.volume = startVol + (tgt - startVol) * (t / duration);
          requestAnimationFrame(tick);
        } catch(e) {}
      };
      requestAnimationFrame(tick);
    });
  },

  // 鍥炲繂闊虫晥娣″嚭
  fadeOutRecall(duration) {
    const dur = duration || 1.5;
    try {
      if (this._recallGain && this.ctx) {
        const now = this.ctx.currentTime;
        this._recallGain.gain.cancelScheduledValues(now);
        this._recallGain.gain.setValueAtTime(this._recallGain.gain.value, now);
        this._recallGain.gain.linearRampToValueAtTime(0.001, now + dur);
        if (this._recallSrc) { try { this._recallSrc.stop(now + dur + 0.1); } catch(e) {} }
        this._recallGain = null; this._recallSrc = null;
      }
      // Restore ambient volumes (smooth over dur)
      this._fadeAmbientTo(this._ambientOrigVol, dur, this._ambientOrigVol2);
      if (this._recallEl) {
        const el = this._recallEl;
        if (el.ended) { el.src = ''; this._recallEl = null; return; }
        const startVol = el.volume;
        const start = Date.now();
        const tick = () => {
          try {
            const t = (Date.now() - start) / 1000;
            if (t >= dur || el.ended) { el.pause(); el.src = ''; return; }
            el.volume = Math.max(0, startVol * (1 - t / dur));
            requestAnimationFrame(tick);
          } catch(e) { el.pause(); el.src = ''; }
        };
        requestAnimationFrame(tick);
        this._recallEl = null;
      }
    } catch(e) {}
  },

  // 鐗规畩鐗╁搧鍦烘櫙闊虫晥
  playSpecial(name) {
    if (!this.ctx || this._muted) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    const ctx = this.ctx;
    if (name === 'nightstand_unlock') {
      // 閽ュ寵涓侀浂褰撳暦锛氬缁勯珮棰戦噾灞炵鎾炲０
      const clinks = [
        { t: 0.00, f1: 4800, f2: 3500, dur: 0.08, vol: 0.18 },
        { t: 0.12, f1: 3800, f2: 2800, dur: 0.10, vol: 0.15 },
        { t: 0.28, f1: 5500, f2: 4000, dur: 0.07, vol: 0.16 },
        { t: 0.42, f1: 3200, f2: 2200, dur: 0.12, vol: 0.13 },
        { t: 0.55, f1: 4200, f2: 3000, dur: 0.09, vol: 0.10 },
      ];
      clinks.forEach(c => {
        const osc = ctx.createOscillator(); osc.type = 'sine';
        osc.frequency.setValueAtTime(c.f1, ctx.currentTime + c.t);
        osc.frequency.exponentialRampToValueAtTime(c.f2, ctx.currentTime + c.t + c.dur);
        const g = ctx.createGain(); g.gain.setValueAtTime(0, ctx.currentTime + c.t);
        g.gain.linearRampToValueAtTime(c.vol, ctx.currentTime + c.t + 0.005);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + c.t + c.dur);
        osc.connect(g).connect(this.masterGain);
        osc.start(ctx.currentTime + c.t); osc.stop(ctx.currentTime + c.t + c.dur + 0.01);
        const n = ctx.createBufferSource(); n.buffer = this._noise(c.dur);
        const ng = ctx.createGain(); ng.gain.setValueAtTime(0, ctx.currentTime + c.t);
        ng.gain.linearRampToValueAtTime(c.vol * 0.6, ctx.currentTime + c.t + 0.003);
        ng.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + c.t + c.dur * 0.6);
        n.connect(ng).connect(this.masterGain);
        n.start(ctx.currentTime + c.t); n.stop(ctx.currentTime + c.t + c.dur);
      });
    } else if (name === 'mahjong') {
      // 娲楃墝澹版媺浼? 浣庨鑴夊啿
      const n = ctx.createBufferSource(); n.buffer = this._noise(0.5);
      const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 600; f.Q.value = 2;
      const g = ctx.createGain(); g.gain.setValueAtTime(0.2, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+1.5);
      n.connect(f).connect(g).connect(this.masterGain); n.start(); n.stop(ctx.currentTime+1.6);
    } else if (name === 'portrait') {
      // 浣庨鍡￠福
      const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.value = 55;
      const g = ctx.createGain(); g.gain.setValueAtTime(0.1, ctx.currentTime); g.gain.linearRampToValueAtTime(0, ctx.currentTime+2);
      osc.connect(g).connect(this.masterGain); osc.start(); osc.stop(ctx.currentTime+2.5);
    } else if (name === 'broom_pickup') {
      // 鎵笟鎽╂摝澹? 鍣０浣庨
      const n = ctx.createBufferSource(); n.buffer = this._noise(0.3);
      const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 300;
      const g = ctx.createGain(); g.gain.setValueAtTime(0.15, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
      n.connect(f).connect(g).connect(this.masterGain); n.start(); n.stop(ctx.currentTime+0.5);
    } else if (name === 'key_swept') {
      // 閲戝睘閽ュ寵閾剧鎾炲０
      const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.setValueAtTime(2000, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(4000, ctx.currentTime+0.03);
      const g = ctx.createGain(); g.gain.setValueAtTime(0.12, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.08);
      osc.connect(g).connect(this.masterGain); osc.start(); osc.stop(ctx.currentTime+0.1);
    } else if (name === 'tap') {
      // 姘存场澹? 300鈫?50Hz sweep
      const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.setValueAtTime(300, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime+0.12);
      const g = ctx.createGain(); g.gain.setValueAtTime(0.1, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.2);
      osc.connect(g).connect(this.masterGain); osc.start(); osc.stop(ctx.currentTime+0.25);
    } else if (name === 'mirror_submit') {
      // 鐜荤拑纰庤鎰?+ 娣锋矊閾哄簳
      const n = ctx.createBufferSource(); n.buffer = this._noise(0.15);
      const f = ctx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 2000;
      const g = ctx.createGain(); g.gain.setValueAtTime(0.25, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.5);
      n.connect(f).connect(g).connect(this.masterGain); n.start(); n.stop(ctx.currentTime+0.6);
      const osc = ctx.createOscillator(); osc.type = 'sawtooth'; osc.frequency.value = 100;
      const g2 = ctx.createGain(); g2.gain.setValueAtTime(0.08, ctx.currentTime); g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+1);
      osc.connect(g2).connect(this.masterGain); osc.start(); osc.stop(ctx.currentTime+1.2);
    } else if (name === 'books') {
      // 钖勭焊鎽╂摝澹?
      const n = ctx.createBufferSource(); n.buffer = this._noise(0.08);
      const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 2500; f.Q.value = 4;
      const g = ctx.createGain(); g.gain.setValueAtTime(0.06, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.1);
      n.connect(f).connect(g).connect(this.masterGain); n.start(); n.stop(ctx.currentTime+0.12);
    } else if (name === 'recall_photo_park') {
      // 鍏洯鐜闊筹紙鍥炲繂 MP3 鐢?playRecall 鎾斁锛?
      const n = ctx.createBufferSource(); n.buffer = this._noise(3);
      const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 800; f.Q.value = 1;
      const g = ctx.createGain(); g.gain.setValueAtTime(0.05, ctx.currentTime); g.gain.linearRampToValueAtTime(0, ctx.currentTime+2);
      n.connect(f).connect(g).connect(this.masterGain); n.start(); n.stop(ctx.currentTime+3);
    } else if (name === 'recall_yarn_tv') {
      // 鐢佃鐧藉櫔闊筹紙鍥炲繂 MP3 鐢?playRecall 鎾斁锛?
      const n = ctx.createBufferSource(); n.buffer = this._noise(2);
      const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 2000; f.Q.value = 2;
      const g = ctx.createGain(); g.gain.setValueAtTime(0.06, ctx.currentTime); g.gain.linearRampToValueAtTime(0, ctx.currentTime+2);
      n.connect(f).connect(g).connect(this.masterGain); n.start(); n.stop(ctx.currentTime+2.5);
    } else if (name === 'recall_pill_heart') {
      // 杩滃蹇冭烦锛堝洖蹇?MP3 鐢?playRecall 鎾斁锛?
      for (let i = 0; i < 3; i++) {
        setTimeout(() => {
          const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.value = 60;
          const g = ctx.createGain(); g.gain.setValueAtTime(0.06, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.2);
          osc.connect(g).connect(this.masterGain); osc.start(); osc.stop(ctx.currentTime+0.25);
        }, i * 600);
      }
    }
  },

  toggleMute() {
    if (!this.ctx) return;
    if (this.ctx.state === 'suspended') { this.ctx.resume(); if (this.masterGain) this.masterGain.gain.value = 1; this._muted = false; }
    else { this.ctx.suspend(); this._muted = true; }
  },

  playAmbient(name, vol) {
    this.stopAmbient();
    this._ambientOrigVol = vol !== undefined ? vol : 0.3;
    const el = new Audio('./assets/audio/' + name + '.mp4');
    el.loop = true;
    el.volume = this._ambientOrigVol;
    el.muted = this._muted;
    el.play().catch(() => {});
    this._ambientEl = el;
    this._ambientEl2 = null;
    this._ambientOrigVol2 = undefined;
  },

  playAmbientLayer2(name, vol) {
    this.stopAmbientLayer2();
    this._ambientOrigVol2 = vol !== undefined ? vol : 0.25;
    const el = new Audio('./assets/audio/' + name + '.mp4');
    el.loop = true;
    el.volume = this._ambientOrigVol2;
    el.muted = this._muted;
    el.play().catch(() => {});
    this._ambientEl2 = el;
  },

  stopAmbientLayer2() {
    if (this._ambientEl2) { this._ambientEl2.pause(); this._ambientEl2 = null; }
  },

  stopAmbient() {
    if (this._ambientEl) { this._ambientEl.pause(); this._ambientEl = null; }
    this.stopAmbientLayer2();
  },
};

function showDlg(text, ms) {
  clearTimeout(S.dlgTimer);
  clearInterval(S.dlgBrownian);

  // Phase 3: dialog text Brownian motion
  const phase = getPhase();
  if (phase === 3) {
    dlgText.innerHTML = '';
    const chars = text.split('').map(ch => {
      const span = document.createElement('span');
      span.textContent = ch;
      span.style.cssText = 'display:inline-block;position:relative;transition:none;margin-right:0.15em;';
      dlgText.appendChild(span);
      return span;
    });
    S.dlgBrownian = setInterval(() => {
      if (!dlgBox.classList.contains('show')) { clearInterval(S.dlgBrownian); return; }
      chars.forEach(s => {
        const dx = (Math.random() - 0.5) * 8;
        const dy = (Math.random() - 0.5) * 6;
        s.style.transform = `translate(${dx}px,${dy}px)`;
      });
    }, 120);
  } else {
    dlgText.textContent = text;
  }

  dlgBox.classList.add('show');
  if (ms) S.dlgTimer = setTimeout(() => dlgBox.classList.remove('show'), ms);
}
function hideDlg() { clearTimeout(S.dlgTimer); clearInterval(S.dlgBrownian); dlgBox.classList.remove('show'); }
function showDlgSequence(lines, onDone) {
  if (!lines || !lines.length) { if (onDone) onDone(); return; }
  let idx = 0;
  const total = lines.length;
  let seqHandler = null;
  let seqActive = true;
  let blockHandler = null;

  function startBlock() {
    blockHandler = function(e) {
      if (!seqActive || !dlgBox.classList.contains('show')) return;
      if (!dlgBox.contains(e.target)) e.stopPropagation();
    };
    document.addEventListener('click', blockHandler, true);
  }
  function stopBlock() {
    if (blockHandler) { document.removeEventListener('click', blockHandler, true); blockHandler = null; }
  }

  function finish() {
    if (!seqActive) return;
    seqActive = false;
    stopBlock();
    if (seqHandler) { document.removeEventListener('click', seqHandler); seqHandler = null; }
    if (!modalOv.classList.contains('show')) closeHint.textContent = '';
    hideDlg();
    dlgBox.style.zIndex = '650';
    if (onDone) onDone();
  }

  function showNext() {
    if (!seqActive) return;
    if (idx >= total) { finish(); return; }
    const isLast = idx === total - 1;
    showDlg(lines[idx++]);
    if (isLast) {
      closeHint.textContent = '';
      stopBlock();
    }

    seqHandler = function(e) {
      document.removeEventListener('click', seqHandler); seqHandler = null;
      if (isLast) { finish(); }
      else showNext();
    };
    setTimeout(() => { if (seqActive) document.addEventListener('click', seqHandler); }, 50);
  }

  showNext();
}

}

// ===== Crayon =====
// ===== Shared chaos-phase guess system =====
function initGuessItem(cfg) {
  return function() {
    const item = cfg.itemObj;
    if (item.st === 'done' || item.st === 'wrong') return;
    const phase = getPhase();

    openModal(cfg.blurredSrc);
    modalHint.textContent = phase === 1 ? cfg.hintPrompt || 'What is this...?' : '';
    closeHint.textContent = '';
    guessArea.innerHTML = '';
    guessArea.style.position = '';

    const opts = cfg.opts;
    const correctVal = cfg.correctVal;

    function finish() {
      AudioManager.fadeOutRecall();
      closeModal();
      hideDlg();
      updHotspots();
      modalOv.onclick = null;
    }

    function handleCorrect(btn) {
      if (btn) btn.classList.add('correct');
      document.querySelectorAll('.outline-overlay').forEach(el => el.remove());
      modalHint.textContent = '';
      modalImg.src = cfg.memorySrc;
      modalImg.style.opacity = '1';
      item.st = 'done';
      onItemGuessed();
      closeHint.textContent = '';
      AudioManager.playRecall(cfg.correctVal);
      if (cfg.correctVal === 'photo') AudioManager.playSpecial('recall_photo_park');
      else if (cfg.correctVal === 'yarn') AudioManager.playSpecial('recall_yarn_tv');
      else if (cfg.correctVal === 'medical') AudioManager.playSpecial('recall_pill_heart');
      showDlgSequence(cfg.memoryLines, finish);
    }

    function handleWrong(btn) {
      btn.classList.add('wrong');
      document.querySelectorAll('.outline-overlay').forEach(el => el.remove());
      modalHint.textContent = 'No, think again...';
      item.st = 'wrong';
      updHotspots();
      closeHint.textContent = '';
      setTimeout(() => {
        closeModal();
        guessArea.innerHTML = '';
        modalHint.textContent = '';
      }, 1500);
    }

    function showOptions() {
      // ===== Phase 1 =====
      if (phase === 1) {
          const btns = opts.map(o => {
            const el = document.createElement('div');
            el.className = 'opt';
            el.textContent = o.lbl;
            el.dataset.val = o.val;
            guessArea.appendChild(el);
            return el;
          });
          const lock = () => btns.forEach(b => b.style.pointerEvents = 'none');
          btns.forEach(btn => {
            btn.onclick = function(e) {
              e.stopPropagation();
              if (item.st === 'done' || item.st === 'wrong') return;
              lock();
              if (this.dataset.val === correctVal) handleCorrect(this);
              else handleWrong(this);
            };
          });
          modalOv.onclick = function(e) {

            if (item.st === 'wrong') { closeModal(); modalOv.onclick = null; }
          };
          return;
        }

        // ===== Phase 2 =====
        if (phase === 2) {
          const btns = opts.map(o => {
            const el = document.createElement('div');
            el.className = 'opt';
            el.dataset.val = o.val;
            const chars = o.lbl.split('').map(ch => {
              const span = document.createElement('span');
              span.className = 'chaos-char';
              span.textContent = ch;
              return span;
            });
            chars.forEach(s => el.appendChild(s));
            guessArea.appendChild(el);
            return el;
          });

          const correctBtn = btns.find(b => b.dataset.val === correctVal);
          const wrongBtns = btns.filter(b => b !== correctBtn);

          const flickerInterval = setInterval(() => {
            if (item.st === 'done' || item.st === 'wrong') { clearInterval(flickerInterval); return; }
            const toggle = Math.floor(Date.now() / 400) % 2 === 0;
            const txt = toggle ? (cfg.flickerLabel || '???') : cfg.correctLabel;
            const cls = toggle ? 'flicker' : '';
            correctBtn.className = 'opt' + (cls ? ' ' + cls : '');
            correctBtn.textContent = txt;
            const chars = txt.split('').map(ch => {
              const span = document.createElement('span');
              span.className = 'chaos-char';
              span.textContent = ch;
              return span;
            });
            correctBtn.innerHTML = '';
            chars.forEach(s => correctBtn.appendChild(s));

            wrongBtns.forEach(btn => {
              const orig = btn.textContent;
              const shifted = orig.split('').map(ch => {
                const r = Math.random();
                if (r < 0.3) return String.fromCharCode(ch.charCodeAt(0) + (Math.random() < 0.5 ? 1 : -1));
                return ch;
              }).join('');
              btn.textContent = shifted;
              btn.className = 'opt' + (Math.random() < 0.3 ? ' flicker' : '');
              const spans = shifted.split('').map(ch => {
                const span = document.createElement('span');
                span.className = 'chaos-char';
                span.textContent = ch;
                return span;
              });
              btn.innerHTML = '';
              spans.forEach(s => btn.appendChild(s));
            });
          }, 400);

          modalOv.addEventListener('mousemove', function repelHandler(e) {
            if (item.st === 'done' || item.st === 'wrong') { modalOv.removeEventListener('mousemove', repelHandler); return; }
            btns.forEach(btn => {
              const rect = btn.getBoundingClientRect();
              const cx = rect.left + rect.width / 2;
              const cy = rect.top + rect.height / 2;
              const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
              const chars = btn.querySelectorAll('.chaos-char');
              if (dist < 120) {
                chars.forEach((ch, i) => {
                  const dir = i % 2 === 0 ? 1 : -1;
                  ch.classList.add('repel');
                  ch.style.transform = `translateX(${dir * 50}px)`;
                });
              } else {
                chars.forEach(ch => { ch.classList.remove('repel'); ch.style.transform = ''; });
              }
            });
          });

          const lock = () => { btns.forEach(b => b.style.pointerEvents = 'none'); clearInterval(flickerInterval); };
          btns.forEach(btn => {
            btn.onclick = function(e) {
              e.stopPropagation();
              if (item.st === 'done' || item.st === 'wrong') return;
              lock();
              if (this.dataset.val === correctVal) {
                modalImg.classList.add('screen-tear');
                setTimeout(() => modalImg.classList.remove('screen-tear'), 600);
                handleCorrect(this);
              } else {
                handleWrong(this);
              }
            };
          });
          modalOv.onclick = function(e) {

            if (item.st === 'wrong') { clearInterval(flickerInterval); closeModal(); modalOv.onclick = null; }
          };
          return;
        }

        // ===== Phase 3 =====
        if (phase === 3) {
          closeHint.textContent = '';
          modalHint.textContent = '......';
          modalImg.style.opacity = '0.3';
          guessArea.style.position = 'absolute';
          guessArea.style.left = '0';
          guessArea.style.top = '0';
          guessArea.style.width = '100%';
          guessArea.style.height = '100%';
          guessArea.style.pointerEvents = 'none';

          const btns = [];
          const rect = modalOv.getBoundingClientRect();
          opts.forEach(o => {
            const el = document.createElement('div');
            el.className = 'opt brownian' + (o.val === correctVal ? ' crayon-target' : '');
            el.textContent = o.lbl;
            el.dataset.val = o.val;
            el.style.pointerEvents = 'auto';
            el.style.left = (rect.left + 50 + Math.random() * (rect.width - 150)) + 'px';
            el.style.top = (rect.top + 50 + Math.random() * (rect.height - 100)) + 'px';
            document.body.appendChild(el);
            btns.push(el);
          });

          let brownianStop = false;
          function getGameRect() { return $('game-canvas').getBoundingClientRect(); }
          function brownianMoveBtns() {
            if (brownianStop) return;
            const area = getGameRect();
            btns.forEach(btn => {
              if (item.st !== 'fresh') { brownianStop = true; return; }
              const bx = parseFloat(btn.style.left);
              const by = parseFloat(btn.style.top);
              const speed = btn.dataset.val === correctVal ? 0.3 : 1;
              let nx = bx + (Math.random() - 0.5) * 250 * speed;
              let ny = by + (Math.random() - 0.5) * 200 * speed;
              nx = Math.max(area.left + 10, Math.min(area.right - 170, nx));
              ny = Math.max(area.top + 10, Math.min(area.bottom - 80, ny));
              btn.style.left = nx + 'px';
              btn.style.top = ny + 'px';
            });
            if (!brownianStop) setTimeout(brownianMoveBtns, 180);
          }
          brownianMoveBtns();

          let spamActive = true;
          const chaosPhrases = (cfg.chaosPhrases || []).filter(p => p !== cfg.correctLabel);
          const outlineImg = document.createElement('img');
          outlineImg.src = cfg.clearSrc;
          outlineImg.className = 'outline-overlay';
          outlineImg.style.cssText = 'position:absolute;inset:0;margin:auto;max-width:85%;max-height:85%;object-fit:contain;opacity:0.7;filter:brightness(0) invert(1) drop-shadow(0 0 3px rgba(255,255,255,0.25));z-index:1;pointer-events:none;';

          const spamTexts = [];

          spamContainer.id = 'chaosSpam';
          spamContainer.style.cssText = 'position:absolute;inset:0;z-index:55;pointer-events:none;overflow:hidden;';
          for (let i = 0; i < 80; i++) {
            const t = document.createElement('span');
            t.className = 'spam-text';
            t.textContent = chaosPhrases[Math.floor(Math.random() * chaosPhrases.length)];
            t.style.fontSize = (14 + Math.random() * 26) + 'px';
            t.style.color = `rgba(255,255,255,${0.1+Math.random()*0.25})`;
            t.style.left = (Math.random() * 95) + '%';
            t.style.top = (Math.random() * 95) + '%';
            t.style.animationDelay = (Math.random() * 2) + 's';
            spamContainer.appendChild(t);
            spamTexts.push(t);
          }
          modalOv.appendChild(spamContainer);

          function brownianSpam() {
            if (!spamActive) return;
            spamTexts.forEach(t => {
              const curL = parseFloat(t.style.left) || Math.random() * 90;
              const curT = parseFloat(t.style.top) || Math.random() * 90;
              t.style.left = Math.max(0, Math.min(92, curL + (Math.random() - 0.5) * 6)) + '%';
              t.style.top = Math.max(0, Math.min(92, curT + (Math.random() - 0.5) * 6)) + '%';
              t.style.opacity = (0.1 + Math.random() * 0.25);
            });
            setTimeout(brownianSpam, 400);
          }
          brownianSpam();

          function persistSpamToScene() {
            const spam = document.getElementById('chaosSpam');
            if (!spam) return;
            const persistent = $('persistentChaos');
            persistent.style.display = 'block';
            const texts = spam.querySelectorAll('.spam-text');
            texts.forEach(t => {
              const clone = t.cloneNode(true);
              clone.style.left = (Math.random() * 90) + '%';
              clone.style.top = (Math.random() * 90) + '%';
              clone.style.color = 'rgba(0,0,0,0.7)';
              persistent.appendChild(clone);
              S.persistentSpam.push(clone);
            });
            spam.remove();
            if (!S.globalChaosActive) {
              S.persistentSpamActive = true;
              (function persistentLoop() {
                if (!S.persistentSpamActive) return;
                S.persistentSpam.forEach(t => {
                  const curL = parseFloat(t.style.left) || 50;
                  const curT = parseFloat(t.style.top) || 50;
                  t.style.left = Math.max(0, Math.min(92, curL + (Math.random() - 0.5) * 4)) + '%';
                  t.style.top = Math.max(0, Math.min(92, curT + (Math.random() - 0.5) * 4)) + '%';
                  t.style.color = 'rgba(0,0,0,1)';
                  t.style.opacity = (0.6 + Math.random() * 0.4);
                });
                setTimeout(persistentLoop, 600);
              })();
            }
          }

          function collapseChaos(isCorrect) {
            if (spamActive === false && !isCorrect) return;
            spamActive = false;
            brownianStop = true;
            persistSpamToScene();
            btns.forEach(b => { if (b.parentNode) b.remove(); });
            if (isCorrect) {
              modalImg.style.opacity = '1';
              handleCorrect(null);
            } else {
              document.querySelectorAll('.outline-overlay').forEach(el => el.remove());
              modalImg.style.opacity = '1';
              modalHint.textContent = 'Memory... fading...';
              item.st = 'wrong';
              updHotspots();
              guessArea.style.pointerEvents = '';
              setTimeout(() => {
                closeModal();
                guessArea.innerHTML = '';
                modalHint.textContent = '';
                guessArea.style.position = '';
                guessArea.style.left = '';
                guessArea.style.top = '';
                guessArea.style.width = '';
                guessArea.style.height = '';
                guessArea.style.pointerEvents = '';
              }, 2000);
            }
          }

          btns.forEach(btn => {
            btn.onclick = function(e) {
              e.stopPropagation();
              if (item.st !== 'fresh') return;
              if (this.dataset.val === correctVal) {
                btn.style.color = 'rgba(100,255,100,1)';
                btn.style.textShadow = '0 0 20px rgba(100,255,100,0.6)';
                setTimeout(() => collapseChaos(true), 300);
              } else {
                btn.style.color = 'rgba(255,80,80,1)';
                setTimeout(() => collapseChaos(false), 200);
              }
            };
          });
          modalOv.onclick = null;

          const origClose = closeModal;
          closeModal = function() {
            document.querySelectorAll('.outline-overlay').forEach(el => el.remove());
            brownianStop = true;
            spamActive = false;
            persistSpamToScene();
            btns.forEach(b => { if (b.parentNode) b.remove(); });
            modalImg.style.opacity = '1';
            guessArea.style.position = '';
            guessArea.style.left = '';
            guessArea.style.top = '';
            guessArea.style.width = '';
            guessArea.style.height = '';
            guessArea.style.pointerEvents = '';
            origClose();
            closeModal = origClose;
          };
        }
    };

    // Play monologue first, then show options
    showDlgSequence(cfg.monologueLines, showOptions);
  };
}

function doNightstand() {
  const item = S.items.nightstand;
  if (item.st === 'unlocked') return;

  openModal('./assets/items/bedroom/nightstand_locked.png');

  if (!S.inv.includes('key')) {
    modalHint.textContent = 'Need a key';
    showDlg("No matter how hard I pull, there is only the rusty screech of jammed iron in the keyhole. (need a key)");
    modalOv.onclick = function(e) {

      closeModal(); hideDlg();
      modalOv.onclick = null;
    };
    return;
  }

  // Has key 鈫?show the drawer opened with ring guess
  AudioManager.playClick('tick');
  modalHint.textContent = 'A wedding ring and a key in the drawer...';
  closeModal();
  modalOv.onclick = null;

  setTimeout(() => {
    const ringItem = { st: 'fresh' };
    openModal('./assets/items/bedroom/ring_blurred.png');
    modalHint.textContent = getPhase() === 1 ? 'What is this...?' : '';
    closeHint.textContent = '';
    guessArea.innerHTML = '';

    const ringMonologue = ['A wedding ring... whose is this?'];
    const ringMemoryLines = ["Husband: It's our wedding day. Why are you crying?", "Husband: Huijun, stay with me, and I'll never let you suffer."];
    const ringOpts = [
      { lbl: 'Wedding Ring', val: 'ring' },
      { lbl: 'Bracelet', val: 'bracelet' },
      { lbl: 'Necklace', val: 'necklace' }
    ];
    const correctVal = 'ring';

    function handleCorrect(btn) {
      if (btn) btn.classList.add('correct');
      document.querySelectorAll('.outline-overlay').forEach(el => el.remove());
      modalHint.textContent = 'A wedding ring...';
      item.st = 'unlocked';
      onItemGuessed();
      if (!S.inv.includes('ring')) { S.inv.push('ring'); updInv(); }
      if (!S.inv.includes('study_key')) { S.inv.push('study_key'); updInv(); }
      closeHint.textContent = '';
      AudioManager.playRecall('ring');

      // Show wedding memory image + memory text
      modalImg.src = './assets/memories/memory5_wedding.png';
      modalImg.style.opacity = '1';
      showDlgSequence(ringMemoryLines, function() {
        AudioManager.fadeOutRecall();
        closeModal();
        hideDlg();
        updHotspots();
        modalOv.onclick = null;
      });
    }

    function handleWrong(btn) {
      btn.classList.add('wrong');
      document.querySelectorAll('.outline-overlay').forEach(el => el.remove());
      modalHint.textContent = 'No, think again...';
      closeHint.textContent = '';
      setTimeout(() => {
        closeModal();
        guessArea.innerHTML = '';
        modalHint.textContent = '';
      }, 1500);
    }

    const phase = getPhase();

    function showRingOptions() {
      // Phase 1
      if (phase === 1) {
        const btns = ringOpts.map(o => {
          const el = document.createElement('div');
          el.className = 'opt';
          el.textContent = o.lbl;
          el.dataset.val = o.val;
          guessArea.appendChild(el);
          return el;
        });
        const lock = () => btns.forEach(b => b.style.pointerEvents = 'none');
        btns.forEach(btn => {
          btn.onclick = function(e) {
            e.stopPropagation();
            lock();
            if (this.dataset.val === correctVal) handleCorrect(this);
            else handleWrong(this);
          };
        });
        modalOv.onclick = function(e) {

          if (ringItem.st === 'wrong') { closeModal(); modalOv.onclick = null; }
        };
        return;
      }

      // Phase 2
      if (phase === 2) {
        const btns = ringOpts.map(o => {
          const el = document.createElement('div');
          el.className = 'opt';
          el.dataset.val = o.val;
          const chars = o.lbl.split('').map(ch => {
            const span = document.createElement('span');
            span.className = 'chaos-char';
            span.textContent = ch;
            return span;
          });
          chars.forEach(s => el.appendChild(s));
          guessArea.appendChild(el);
          return el;
        });

        const allSpans = btns.flatMap(b => [...b.querySelectorAll('.chaos-char')]);
        const chaosInterval = setInterval(() => {
          if (!modalOv.classList.contains('show')) { clearInterval(chaosInterval); return; }
          allSpans.forEach(s => {
            if (Math.random() < 0.3) {
              const r = Math.random();
              if (r < 0.7) {
                s.style.transform = `translate(${(Math.random() - 0.5) * 20}px,${(Math.random() - 0.5) * 20}px)`;
              } else {
                s.textContent = String.fromCharCode(s.textContent.charCodeAt(0) + (Math.random() < 0.5 ? 1 : -1));
              }
            }
          });
          btns.forEach(b => {
            b.onmousemove = function(ev) {
              const rect = this.getBoundingClientRect();
              const mx = ev.clientX, my = ev.clientY;
              const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
              const dist = Math.sqrt((mx - cx) ** 2 + (my - cy) ** 2);
              if (dist < 120) {
                const angle = Math.atan2(my - cy, mx - cx);
                const push = 50 * (1 - dist / 120);
                this.style.transform = `translate(${-Math.cos(angle) * push}px,${-Math.sin(angle) * push}px)`;
              } else {
                this.style.transform = '';
              }
            };
          });
        }, 400);

        const lock = () => { clearInterval(chaosInterval); btns.forEach(b => b.style.pointerEvents = 'none'); };
        btns.forEach(btn => {
          btn.onclick = function(e) {
            e.stopPropagation();
            lock();
            if (this.dataset.val === correctVal) handleCorrect(this);
            else handleWrong(this);
          };
        });
        modalOv.onclick = function(e) {

          if (ringItem.st === 'wrong') { closeModal(); clearInterval(chaosInterval); modalOv.onclick = null; }
        };
        return;
      }

      // Phase 3
      if (phase === 3) {
        closeHint.textContent = '';
        modalHint.textContent = '......';
        modalImg.style.opacity = '0.3';
        guessArea.style.position = 'absolute';
        guessArea.style.left = '0';
        guessArea.style.top = '0';
        guessArea.style.width = '100%';
        guessArea.style.height = '100%';
        guessArea.style.pointerEvents = 'none';

        const outlineImg = document.createElement('img');
        outlineImg.src = './assets/items/bedroom/ring.png';
        outlineImg.className = 'outline-overlay';
        outlineImg.style.cssText = 'position:absolute;inset:0;margin:auto;max-width:85%;max-height:85%;object-fit:contain;opacity:0.7;filter:brightness(0) invert(1) drop-shadow(0 0 3px rgba(255,255,255,0.25));z-index:1;pointer-events:none;';
        modalOv.appendChild(outlineImg);

        const opts = ringOpts.map(o => {
          const el = document.createElement('div');
          el.className = 'opt brownian';
          el.dataset.val = o.val;
          el.textContent = o.lbl;
          el.style.pointerEvents = 'auto';
          const rect = modalOv.getBoundingClientRect();
          el.style.left = (rect.left + 50 + Math.random() * (rect.width - 150)) + 'px';
          el.style.top = (rect.top + 50 + Math.random() * (rect.height - 100)) + 'px';
          document.body.appendChild(el);
          return el;
        });

        let brownianStop = false;
        function getGameRect() { return $('game-canvas').getBoundingClientRect(); }
        function brownianMoveBtns() {
          if (brownianStop) return;
          const area = getGameRect();
          opts.forEach(btn => {
            if (ringItem.st !== 'fresh') { brownianStop = true; return; }
            const bx = parseFloat(btn.style.left);
            const by = parseFloat(btn.style.top);
            const speed = btn.dataset.val === 'ring' ? 0.3 : 1;
            let nx = bx + (Math.random() - 0.5) * 250 * speed;
            let ny = by + (Math.random() - 0.5) * 200 * speed;
            nx = Math.max(area.left + 10, Math.min(area.right - 170, nx));
            ny = Math.max(area.top + 10, Math.min(area.bottom - 80, ny));
            btn.style.left = nx + 'px';
            btn.style.top = ny + 'px';
          });
          if (!brownianStop) setTimeout(brownianMoveBtns, 180);
        }
        brownianMoveBtns();

        let spamActive = true;
        const chaosPhrases = ['I remember...', 'the ring...', 'our wedding...', 'so long ago...'];
        const spamTexts = [];
        const spamContainer = document.createElement('div');
        spamContainer.className = 'chaos-spam';
        spamContainer.id = 'chaosSpam';
        spamContainer.style.cssText = 'position:absolute;inset:0;z-index:55;pointer-events:none;overflow:hidden;';
        for (let i = 0; i < 40; i++) {
          const t = document.createElement('span');
          t.className = 'spam-text';
          t.textContent = chaosPhrases[Math.floor(Math.random() * chaosPhrases.length)];
          t.style.fontSize = (14 + Math.random() * 26) + 'px';
          t.style.color = `rgba(255,255,255,${0.1+Math.random()*0.25})`;
          t.style.left = (Math.random() * 95) + '%';
          t.style.top = (Math.random() * 95) + '%';
          t.style.animationDelay = (Math.random() * 2) + 's';
          spamContainer.appendChild(t);
          spamTexts.push(t);
        }
        modalOv.appendChild(spamContainer);

        function brownianSpam() {
          if (!spamActive) return;
          spamTexts.forEach(t => {
            const curL = parseFloat(t.style.left) || Math.random() * 90;
            const curT = parseFloat(t.style.top) || Math.random() * 90;
            t.style.left = Math.max(0, Math.min(92, curL + (Math.random() - 0.5) * 6)) + '%';
            t.style.top = Math.max(0, Math.min(92, curT + (Math.random() - 0.5) * 6)) + '%';
            t.style.opacity = (0.1 + Math.random() * 0.25);
          });
          setTimeout(brownianSpam, 400);
        }
        brownianSpam();

        function collapseChaos(isCorrect) {
          if (spamActive === false && !isCorrect) return;
          spamActive = false;
          brownianStop = true;
          opts.forEach(b => { if (b.parentNode) b.remove(); });
          if (isCorrect) {
            if (spamContainer.parentNode) spamContainer.remove();
            document.querySelectorAll('.outline-overlay').forEach(el => el.remove());
            modalImg.style.opacity = '1';
            handleCorrect(null);
          } else {
            document.querySelectorAll('.outline-overlay').forEach(el => el.remove());
            modalImg.style.opacity = '1';
            modalHint.textContent = 'Memory... fading...';
            ringItem.st = 'wrong';
            guessArea.style.pointerEvents = '';
            setTimeout(() => {
              closeModal();
              guessArea.innerHTML = '';
              modalHint.textContent = '';
              guessArea.style.position = '';
              guessArea.style.left = '';
              guessArea.style.top = '';
              guessArea.style.width = '';
              guessArea.style.height = '';
              guessArea.style.pointerEvents = '';
            }, 2000);
          }
        }

        const lock = () => { opts.forEach(b => b.style.pointerEvents = 'none'); };
        opts.forEach(btn => {
          btn.onclick = function(e) {
            e.stopPropagation();
            if (ringItem.st !== 'fresh') return;
            lock();
            if (this.dataset.val === correctVal) {
              btn.style.color = 'rgba(100,255,100,1)';
              btn.style.textShadow = '0 0 20px rgba(100,255,100,0.6)';
              setTimeout(() => collapseChaos(true), 300);
            } else {
              btn.style.color = 'rgba(255,80,80,1)';
              setTimeout(() => collapseChaos(false), 200);
            }
          };
        });
        modalOv.onclick = null;

        const origClose = closeModal;
        closeModal = function() {
          document.querySelectorAll('.outline-overlay').forEach(el => el.remove());
          brownianStop = true;
          spamActive = false;
          opts.forEach(b => { if (b.parentNode) b.remove(); });
          if (spamContainer.parentNode) spamContainer.remove();
          modalImg.style.opacity = '1';
          guessArea.style.position = '';
          guessArea.style.left = '';
          guessArea.style.top = '';
          guessArea.style.width = '';
          guessArea.style.height = '';
          guessArea.style.pointerEvents = '';
          origClose();
          closeModal = origClose;
        };
      }
    }

    // Show monologue first, then options
    showDlgSequence(ringMonologue, showRingOptions);
  }, 300);
}

}
